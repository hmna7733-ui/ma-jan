<title>セットスコア記録</title>
<meta name="app-version" content="2026.07.15-1">
<!-- Firebase Compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{
  --accent:#2f8f5f;
  --accent2:#1f7a52;
  --accent-dark:#0f2e20;
  --accent-light:#e7f4ec;
  --bg:#eef1ec;
  --card:#ffffff;
  --text:#1b2420;
  --sub:#67716a;
  --danger:#c0392b;
  --danger-light:#fdecea;
  --warn:#d68910;
  --border:#e1e5dd;
  --gold:#c8912a;
  --gold2:#e6b94a;
  --radius:18px;
  --shadow-card:0 1px 2px rgba(20,40,25,.05), 0 10px 24px -10px rgba(20,40,25,.18);
  --shadow-btn:0 2px 0 rgba(0,0,0,.16), 0 6px 14px -4px rgba(15,46,32,.35);
  --shadow-press:0 1px 0 rgba(0,0,0,.16);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  background:
    radial-gradient(circle at 15% 0%, rgba(47,143,95,.10), transparent 40%),
    var(--bg);
  color:var(--text);
  padding-bottom:82px;
  -webkit-tap-highlight-color:transparent;
}
#app{max-width:720px;margin:0 auto;padding:16px 14px 8px;}
h1,h2,h3{margin:0 0 8px;}

/* ===== ヘッダー ===== */
.header-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px calc(16px + env(safe-area-inset-top)/3);
  background:linear-gradient(150deg,#1c503a 0%,#0f2e20 65%);
  color:#fff;position:sticky;top:0;z-index:20;
  box-shadow:0 6px 18px -6px rgba(10,30,20,.55);
  border-radius:0 0 20px 20px;
}
.header-bar .title{font-size:18px;font-weight:800;letter-spacing:.5px;display:flex;align-items:center;gap:7px;}
.header-bar .date{font-size:11.5px;opacity:.75;margin-top:2px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#8a938c;display:inline-block;box-shadow:0 0 0 3px rgba(255,255,255,.08);}
.sync-dot.on{background:#57e39a;box-shadow:0 0 0 3px rgba(87,227,154,.18);}

/* ===== カード ===== */
.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:14px;
  box-shadow:var(--shadow-card);
  border:1px solid rgba(255,255,255,.6);
}
.card h3{font-size:14px;color:var(--sub);font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;}

/* ===== ボタン ===== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:none;border-radius:13px;padding:12px 18px;font-size:14.5px;font-weight:700;
  cursor:pointer;color:#fff;

<script>
/* ============ Firebase 設定（複数端末同期用） ============ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAv35i4MSksru9csqLBbtZvHEJbWfaVQGs",
  authDomain: "boat-d715f.firebaseapp.com",
  projectId: "boat-d715f",
  storageBucket: "boat-d715f.firebasestorage.app",
  messagingSenderId: "143618120714",
  appId: "1:143618120714:web:8fe8f3548ada361d5053f3",
  measurementId: "G-JPB6Y4GNP0"
};
const COLLECTION = 'mahjong_setscore';
const SKIP_KEY = 'mj_auth_skip';
const LS_KEY = 'mj_data_v2';

let fbApp=null, fbAuth=null, fbDb=null, currentUser=null;
let cloudPushTimer=null, authTabMode='login';
let _unsubscribeSnapshot=null, _isUploading=false;

function userDocRef(){ return fbDb.collection(COLLECTION).doc(currentUser.uid); }

function initFirebase(){
  if(typeof firebase === 'undefined'){
    console.warn('Firebase SDKを読み込めなかったため、ローカル保存モードで起動します（プレビュー環境の制限、通信不可などの場合はこちらが表示されます）');
    localStorage.setItem(SKIP_KEY, '1');
    showApp();
    return;
  }
  try{
    fbApp = firebase.initializeApp(FIREBASE_CONFIG);
    fbAuth = firebase.auth();
    fbDb = firebase.firestore();
    fbAuth.onAuthStateChanged(handleAuthChange);
  }catch(e){
    console.error('Firebase init error', e);
    localStorage.setItem(SKIP_KEY, '1');
    showApp();
  }
}

function setSyncDot(on){
  const el = document.getElementById('syncDot');
  if(el) el.classList.toggle('on', !!on);
}

function handleAuthChange(user){
  if(_unsubscribeSnapshot){ _unsubscribeSnapshot(); _unsubscribeSnapshot=null; }
  if(user){
    currentUser = user;
    localStorage.removeItem(SKIP_KEY);
    showApp();
    setSyncDot(true);
    _unsubscribeSnapshot = userDocRef().onSnapshot(doc=>{
      if(_isUploading) return;
      if(doc.exists){
        try{
          const remote = JSON.parse(doc.data().payload || '{}');
          DB.rules = remote.rules || DB.rules;
          DB.members = remote.members || DB.members;
          DB.history = remote.history || DB.history;
          DB.chipTx = remote.chipTx || DB.chipTx || [];
          DB.rules.forEach(ensureRuleDefaults);
          localStorage.setItem(LS_KEY, JSON.stringify(DB));
          render();
        }catch(e){ console.error('parse error', e); }
      } else {
        queueCloudPush(true);
      }
    }, e=>console.error('snapshot error', e));
  } else {
    currentUser = null;
    setSyncDot(false);
    if(localStorage.getItem(SKIP_KEY)==='1'){ showApp(); }
    else{ showGate(); }
  }
}

function queueCloudPush(immediate=false){
  if(!currentUser) return;
  clearTimeout(cloudPushTimer);
  const doWrite = ()=>{
    _isUploading = true;
    userDocRef().set({
      payload: JSON.stringify({rules:DB.rules, members:DB.members, history:DB.history, chipTx:DB.chipTx}),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(()=>{ setTimeout(()=>{_isUploading=false;}, 1500); })
    .catch(e=>{ console.error('sync error', e); _isUploading=false; setTimeout(()=>queueCloudPush(true), 3000); });
  };
  if(immediate) doWrite(); else cloudPushTimer=setTimeout(doWrite, 700);
}

function doLogout(){
  if(!fbAuth){ alert('現在ログイン機能が使えない状態です。'); return; }
  if(!confirm('ログアウトしますか？この端末のキャッシュも削除されます。')) return;
  localStorage.removeItem(LS_KEY);
  localStorage.removeItem(SKIP_KEY);
  fbAuth.signOut();
}

function showGate(){
  document.getElementById('gate-root').style.display='flex';
  document.getElementById('app-shell').style.display='none';
  renderGate();
}
function showApp(){
  document.getElementById('gate-root').style.display='none';
  document.getElementById('app-shell').style.display='';
  render();
}

function renderGate(errorMsg=''){
  const card = document.getElementById('gate-card');
  card.innerHTML = `
    <div style="text-align:center;margin-bottom:26px">
      <div style="font-size:34px;margin-bottom:8px">🀄</div>
      <div style="font-size:21px;font-weight:800;color:var(--text);margin-bottom:6px">セットスコア記録</div>
      <div style="font-size:12.5px;color:var(--sub);line-height:1.6">メールアドレスとパスワードでログインすると<br>複数端末でスコアが同期されます</div>
    </div>
    <div style="display:flex;gap:0;margin-bottom:18px;border-radius:12px;overflow:hidden;box-shadow:inset 0 0 0 1.5px var(--border)">
      <button id="gtab-login" style="flex:1;padding:11px;font-size:13px;font-weight:800;border:none;cursor:pointer;font-family:inherit;background:${authTabMode==='login'?'linear-gradient(180deg,var(--accent),var(--accent2))':'#f1f1ec'};color:${authTabMode==='login'?'#fff':'var(--sub)'}" onclick="switchGateTab('login')">ログイン</button>
      <button id="gtab-signup" style="flex:1;padding:11px;font-size:13px;font-weight:800;border:none;cursor:pointer;font-family:inherit;background:${authTabMode==='signup'?'linear-gradient(180deg,var(--accent),var(--accent2))':'#f1f1ec'};color:${authTabMode==='signup'?'#fff':'var(--sub)'}" onclick="switchGateTab('signup')">新規登録</button>
    </div>
    ${errorMsg?`<div style="font-size:12px;color:var(--danger);margin-bottom:14px;padding:11px;background:var(--danger-light);border-radius:10px">${esc(errorMsg)}</div>`:''}
    <div class="field-wrap">
      <label class="field">メールアドレス</label>
      <input id="g-email" type="email" inputmode="email" placeholder="you@example.com">
    </div>
    <div class="field-wrap">
      <label class="field">パスワード（6文字以上）</label>
      <input id="g-password" type="password" placeholder="••••••••">
    </div>
    <button id="g-submit" class="btn block" style="margin-bottom:10px" onclick="doGateAuth()">${authTabMode==='login'?'ログイン':'登録してはじめる'}</button>
    <button class="btn ghost block" onclick="skipLogin()">ログインせずに使う（この端末のみ）</button>
  `;
  setTimeout(()=>{
    const ei=document.getElementById('g-email');
    if(ei) ei.addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('g-password').focus(); });
    const pi=document.getElementById('g-password');
    if(pi) pi.addEventListener('keydown', e=>{ if(e.key==='Enter') doGateAuth(); });
  }, 0);
}

function switchGateTab(mode){ authTabMode=mode; renderGate(); }

function doGateAuth(){
  if(!fbAuth){ renderGate('現在ネットワーク環境の制限によりログイン機能が使えません。「ログインせずに使う」をご利用ください。'); return; }
  const email=document.getElementById('g-email').value.trim();
  const pw=document.getElementById('g-password').value;
  if(!email || pw.length<6){ renderGate('メールアドレスと6文字以上のパスワードを入力してください'); return; }
  const btn=document.getElementById('g-submit');
  btn.textContent='処理中...'; btn.disabled=true;
  const action = authTabMode==='login'
    ? fbAuth.signInWithEmailAndPassword(email, pw)
    : fbAuth.createUserWithEmailAndPassword(email, pw);
  action.catch(err=>{
    const msgs={
      'auth/invalid-email':'メールアドレスの形式が正しくありません',
      'auth/user-not-found':'アカウントが見つかりません。新規登録してください',
      'auth/wrong-password':'パスワードが違います',
      'auth/email-already-in-use':'このメールアドレスは既に登録されています',
      'auth/weak-password':'パスワードは6文字以上にしてください',
      'auth/invalid-credential':'メールアドレスまたはパスワードが違います',
    };
    renderGate(msgs[err.code] || err.message);
  });
}

function skipLogin(){ localStorage.setItem(SKIP_KEY,'1'); showApp(); }

/* ============ ユーティリティ ============ */
const uid = ()=> Date.now().toString(36)+Math.random().toString(36).slice(2,7);

const sign = (n)=> n>0?`+${n}`:`${n}`;

const PALETTE = ['#e07a5f','#3d8bd4','#f2b134','#6a994e','#9d4edd','#e6538c','#2a9d8f','#c65911','#4a6fa5','#8d6a9f'];

/* ============ データ層 ============ */
let DB = { rules:[], members:[], history:[], chipTx:[] };
try{
  const saved = JSON.parse(localStorage.getItem(LS_KEY) || 'null');
  if(saved){ DB = saved; if(!DB.chipTx) DB.chipTx=[]; if(!DB.rules) DB.rules=[]; DB.rules.forEach(ensureRuleDefaults); }

const RATE_PRESETS = [50, 100, 200, 300, 500, 1000];
const CHIP_PRESETS = [100, 200, 300, 500, 1000, 2000];

/* 旧バージョンのデータに新フィールドを補完（後方互換） */
function ensureRuleDefaults(r){
  const def = {
    okaEnabled:false, oka:0, tobiAri:true, tobiPenalty:0, tobiRule:'zero',
    kuitanAri:true, atozukeAri:true, akaDoraEnabled:true,
    ippatsuAri:true, uradoraAri:true, kanUradoraAri:true,
    notenPenaltyEnabled:true,
    furitenAri:false, furitenOpenRequired:'not_required',
    nagashiEnabled:false, nagashiTier:'mangan', nagashiChipEnabled:false,
    sanpuuAri:false, sanrenkouAri:false, otherYakuEnabled:false, otherYakuText:'',
    kazoeYakumanEnabled:true, kazoeYakumanHan:13, kazoeYakumanChipAri:true,
    kokushiAnkanAri:false, paoAri:false,
    extraYakuman:[],
    doubleYakumanPointAri:true, doubleYakumanChipAri:false, stackYakumanAri:true,
    chiitoi4Ari:false, yonchoroAri:false, shiroPocchiAri:false,
    rounding:'up', roundingDetailEnabled:false,
    roundingThresholdValue:30000, roundingAboveMode:'down', roundingBelowMode:'up',
    rateEnabled:false, rate:0,
    chipEnabled:false, chipValue:500, chipCondition:'none', yakumanTsumoChip:10, yakumanRonChip:20,
    renchanType:'tenpai_keishiki', shibariType:'none', shibariHan:2,
    fuCalculation:true, tsumoLoss:false, tsumoPinAri:true,
    kitaHandling:'nukidora',
    specialTiles:[], memo:''
  };
  if(typeof r.akaDora==='number' && r.akaDoraMan===undefined){
    r.akaDoraMan = r.akaDora; r.akaDoraPin=0; r.akaDoraSou=0;
  }
  // 赤ドラ枚数：デフォルトは各牌種2枚。3人打ちの場合のみ5萬は0
  if(r.akaDoraMan===undefined) r.akaDoraMan = (r.playerCount===3) ? 0 : 2;
  if(r.akaDoraPin===undefined) r.akaDoraPin = 2;
  if(r.akaDoraSou===undefined) r.akaDoraSou = 2;
  // ノーテン罰符：4人打ちは300、3人打ちは1000がデフォルト
  if(r.notenPenalty===undefined) r.notenPenalty = (r.playerCount===3) ? 1000 : 300;
  // 旧バージョンの選択肢名を新しい選択肢へ移行
  if(r.renchanType==='tenpai') r.renchanType='tenpai_keishiki';
  if(r.shibariType==='agari') r.shibariType='deai';
  if(r.shibariType==='kakutei') r.shibariType='kanzen';
  if(r.extraYakuman){
    r.extraYakuman.forEach(y=>{ if(y.type==='surenko_manzu') y.type='surenko'; });
  }
  if(r.kitaHandling===undefined && r.kitaDoraEnabled!==undefined){
    r.kitaHandling = r.kitaDoraEnabled ? 'nukidora' : 'none';
  }
  for(const k in def){ if(r[k]===undefined) r[k]=def[k]; }
  return r;
}

/* ============ 計算ロジック ============ */
function computeSession(rule, entries){
  const sorted = [...entries].sort((a,b)=>b.rawScore-a.rawScore);
  const n = sorted.length;
  let ranks=[];
  for(let i=0;i<n;i++){ ranks.push(i>0 && sorted[i].rawScore===sorted[i-1].rawScore ? ranks[i-1] : i+1); }
  const results = sorted.map((e,i)=>({...e, rank:ranks[i]}));
  let i=0;
  while(i<n){
    let j=i; while(j<n && ranks[j]===ranks[i]) j++;
    const count=j-i;
    const slice=(rule.uma||[]).slice(i,j);
    const avg = slice.reduce((a,b)=>a+b,0)/(count||1);
    for(let k=i;k<j;k++) results[k].umaApplied=avg;
    i=j;
  }
  const rank1Count = ranks.filter(r=>r===1).length;
  const okaVal = rule.okaEnabled ? (rule.oka||0) : 0;
  const okaEach = okaVal/(rank1Count||1);
  const tobiThreshold = rule.tobiRule==='minus100' ? -100 : 0;
  results.forEach(r=>{
    let pt = (r.rawScore - rule.returnPoints)/1000 + (r.umaApplied||0);
    if(r.rank===1) pt += okaEach;
    if(rule.tobiAri && rule.tobiPenalty && r.rawScore<=tobiThreshold){
      pt -= rule.tobiPenalty;
    }
    if(rule.rounding==='up') pt = Math.ceil(pt*10)/10;
    else if(rule.rounding==='down') pt = Math.floor(pt*10)/10;
    else pt = Math.round(pt*10)/10;
    r.point = pt;
  });
  return results;
}

function getMember(id){ return DB.members.find(m=>m.id===id); }
function memberName(id){ const m=getMember(id); return m?m.name:'(削除済み)'; }
function memberColor(id){ const m=getMember(id); return m?m.color:'#999'; }
function yenText(point, rule){
  if(rule && rule.rateEnabled && rule.rate){
    // rate は「1000点あたり◯円」を直接表す値（例：rate=100なら1000点=100円）
    // point は「1000点単位」の最終ポイントなので、円 = point × rate
    const yen = Math.round(point*rule.rate);
    return ` <span class="small-note">(${sign(yen)}円)</span>`;
  }
  return '';
}

  const m = getMember(id);

function computeChipTotals(date){
  const totals={};
  DB.chipTx.filter(t=>t.date===date).forEach(t=>{
    if(t.type==='transfer'){
      totals[t.fromId]=(totals[t.fromId]||0)-t.amount;
      totals[t.toId]=(totals[t.toId]||0)+t.amount;
    } else {
      totals[t.memberId]=(totals[t.memberId]||0)+t.amount;
    }
  });
  return totals;
}

/* ============ 描画: 分析 ============ */
function computeStats(memberId){
  const games = DB.history.filter(s=>s.players.some(p=>p.memberId===memberId));
  const n=games.length;
  if(n===0) return null;
  let rankCount=[0,0,0,0], totalPoint=0;
  games.forEach(s=>{
    const p=s.players.find(p=>p.memberId===memberId);
    rankCount[p.rank-1]=(rankCount[p.rank-1]||0)+1;
    totalPoint+=p.point;
  });
  const avgRank=games.reduce((a,s)=>a+s.players.find(p=>p.memberId===memberId).rank,0)/n;
  const topRate=(rankCount[0]||0)/n*100;
  const rentaiRate=((rankCount[0]||0)+(rankCount[1]||0))/n*100;
  return { n, rankCount, totalPoint, avgRank, topRate, rentaiRate, avgPoint: totalPoint/n, games };
}
function computeHeadToHead(memberId){
  const opp={};
  DB.history.forEach(s=>{
    const me=s.players.find(p=>p.memberId===memberId);
    if(!me) return;
    s.players.forEach(p=>{
      if(p.memberId===memberId) return;
      if(!opp[p.memberId]) opp[p.memberId]={games:0,win:0,lose:0,draw:0,diff:0};
      const o=opp[p.memberId];
      o.games++;
      if(me.rank<p.rank) o.win++; else if(me.rank>p.rank) o.lose++; else o.draw++;
      o.diff += (me.point-p.point);
    });
  });
  return opp;
}

      ${DB.members.map(m=>`<option value="${m.id}" ${UI.analysisMemberId===m.id?'selected':''}>${esc(m.name)}</option>`).join('')}
    </select>
  </div>`;
  if(DB.members.length===0 || DB.history.length===0){
    html+=`<div class="card"><div class="empty-state"><div class="big">📊</div>メンバー・履歴が揃うと分析が表示されます</div></div>`;
    document.getElementById('app').innerHTML=html; return;
  }
  if(UI.analysisMemberId==='ALL'){
    html+=`<div class="card"><h3>メンバー別 通算成績</h3>
    <table class="score-board"><thead><tr><th>名前</th><th>試合</th><th>平均順位</th><th>トップ率</th><th>連対率</th><th>通算</th></tr></thead><tbody>`;
    const rows=DB.members.map(m=>({m,s:computeStats(m.id)})).filter(x=>x.s);
    rows.sort((a,b)=>b.s.totalPoint-a.s.totalPoint);
    rows.forEach(({m,s})=>{
      html+=`<tr style="cursor:pointer" onclick="Analysis.setMember('${m.id}')">
        <td>${avatarHtml(m.id,22)} ${esc(m.name)}</td><td>${s.n}</td><td>${s.avgRank.toFixed(2)}</td>
        <td>${s.topRate.toFixed(0)}%</td><td>${s.rentaiRate.toFixed(0)}%</td>
        <td class="${s.totalPoint>0?'pos':s.totalPoint<0?'neg':''}">${sign(Math.round(s.totalPoint*10)/10)}</td>
      </tr>`;
    });
    if(rows.length===0) html+=`<tr><td colspan="6" class="small-note">データがまだありません</td></tr>`;
    html+=`</tbody></table></div>`;
  } else {
    const m=getMember(UI.analysisMemberId);
    const s=computeStats(UI.analysisMemberId);
    if(!s){ html+=`<div class="card"><div class="small-note">${esc(m?m.name:'')} の対局記録がまだありません</div></div>`; }
    else {
      html+=`<div class="card"><h3>${avatarHtml(m.id,26)} ${esc(m.name)} の通算成績</h3>
        <div class="stat-grid">
          <div class="stat-box"><div class="v">${s.n}</div><div class="l">対局数</div></div>
          <div class="stat-box"><div class="v">${s.avgRank.toFixed(2)}</div><div class="l">平均順位</div></div>
          <div class="stat-box"><div class="v">${s.topRate.toFixed(0)}%</div><div class="l">トップ率</div></div>
          <div class="stat-box"><div class="v">${s.rentaiRate.toFixed(0)}%</div><div class="l">連対率</div></div>
          <div class="stat-box"><div class="v ${s.totalPoint>0?'pos':s.totalPoint<0?'neg':''}">${sign(Math.round(s.totalPoint*10)/10)}</div><div class="l">通算ポイント</div></div>
          <div class="stat-box"><div class="v">${sign(Math.round(s.avgPoint*100)/100)}</div><div class="l">平均ポイント</div></div>
        </div>
        <div class="row wrap" style="font-size:12.5px;color:var(--sub);gap:10px">
          <span>1位:${s.rankCount[0]||0}</span><span>2位:${s.rankCount[1]||0}</span>
          <span>3位:${s.rankCount[2]||0}</span>${s.rankCount.length>3?`<span>4位:${s.rankCount[3]||0}</span>`:''}
        </div>
      </div>`;
      const opp=computeHeadToHead(UI.analysisMemberId);
      const oppEntries=Object.entries(opp);
      if(oppEntries.length){
        html+=`<div class="card"><h3>対戦相手別 成績</h3>
        <table class="score-board opp-table"><thead><tr><th>相手</th><th>対局</th><th>勝</th><th>負</th><th>分</th><th>収支差</th></tr></thead><tbody>`;
        oppEntries.sort((a,b)=>b[1].diff-a[1].diff).forEach(([oid,o])=>{
          html+=`<tr style="cursor:pointer" onclick="Analysis.setOpponent('${oid}')">
            <td>${avatarHtml(oid,20)} ${esc(memberName(oid))}</td><td>${o.games}</td><td>${o.win}</td><td>${o.lose}</td><td>${o.draw}</td>
            <td class="${o.diff>0?'pos':o.diff<0?'neg':''}">${sign(Math.round(o.diff*10)/10)}</td>
          </tr>`;
        });
        html+=`</tbody></table></div>`;
      }
      let games=s.games;
      let filterNote='';
      if(UI.analysisOpponentId){
        games=games.filter(g=>g.players.some(p=>p.memberId===UI.analysisOpponentId));
        filterNote=`<button class="link-btn" onclick="Analysis.clearOpponent()">✕ ${esc(memberName(UI.analysisOpponentId))}との対局のみ表示中（解除）</button>`;
      }
      html+=`<div class="card"><h3>この分析の元になった対局一覧（${games.length}件）</h3>${filterNote}`;
      [...games].sort((a,b)=>b.date.localeCompare(a.date)).forEach(g=>html+=sessionCardHtml(g));
      html+=`</div>`;
    }
  }
  document.getElementById('app').innerHTML=html;
}
const Analysis = {
  setMember(id){ UI.analysisMemberId=id; UI.analysisOpponentId=null; render(); },
  setOpponent(id){ UI.analysisOpponentId=id; render(); },
  clearOpponent(){ UI.analysisOpponentId=null; render(); }
};

const Settings = {
  setSub(s){ UI.settingsSub=s; render(); },

  newMember(){

    renderMemberModal();
  },
  editMember(id){
    UI.editingMemberId=id;
    UI.memberDraft=JSON.parse(JSON.stringify(getMember(id)));
    renderMemberModal();
  },
  removeMember(id){
    if(!confirm('このメンバーを削除しますか？（過去の履歴データは残ります）')) return;
    DB.members=DB.members.filter(m=>m.id!==id);
    persist('members'); render();
  },
  updateMemberDraft(key,val){ UI.memberDraft[key]=val; },
  saveMember(){
    const d=UI.memberDraft;
    if(!d.name || !d.name.trim()){ alert('名前を入力してください'); return; }
    d.name=d.name.trim();
    if(UI.editingMemberId){
      const idx=DB.members.findIndex(m=>m.id===UI.editingMemberId);
      DB.members[idx]=d;
    } else {
      DB.members.push(d);
    }
    persist('members');
    UI.memberDraft=null;
    document.getElementById('modalRoot').innerHTML='';
    render();
  },
  closeMemberModal(){ UI.memberDraft=null; document.getElementById('modalRoot').innerHTML=''; },

  newRule(){
    UI.editingRuleId=null;
    UI.ruleDraft=ensureRuleDefaults({
      id:uid(), name:'新しいルール', playerCount:4, gameType:'hanchan',
      startPoints:25000, returnPoints:30000, uma:[20,10,-10,-20]
    });
    renderRuleModal();
  },
  editRule(id){ UI.editingRuleId=id; UI.ruleDraft=ensureRuleDefaults(JSON.parse(JSON.stringify(getRule(id)))); renderRuleModal(); },
  removeRule(id){
    if(!confirm('このルールを削除しますか？（このルールを使った履歴は残ります）')) return;

    persist('rules'); render();
  },
  closeRuleModal(){ UI.ruleDraft=null; document.getElementById('modalRoot').innerHTML=''; },
  setPlayerCount(n){
    n=parseInt(n);
    const d=UI.ruleDraft;
    d.playerCount=n;
    d.uma = n===3 ? [15,0,-15] : [20,10,-10,-20];
    d.akaDoraMan = n===3 ? 0 : 2;

    rerenderRulePreserve();
  },
  applyUmaPreset(arr){ UI.ruleDraft.uma=[...arr]; rerenderRulePreserve(); },
  updateDraft(key,val){ UI.ruleDraft[key]=val; },
  toggleDraft(key){ UI.ruleDraft[key]=!UI.ruleDraft[key]; rerenderRulePreserve(); },
  setShibariType(val){ UI.ruleDraft.shibariType=val; rerenderRulePreserve(); },
  updateUma(idx,val){ UI.ruleDraft.uma[idx]=numOrZero(val); updateAxisDisplay(); },
  autoOka(){
    const d=UI.ruleDraft;
    d.oka = (d.returnPoints - d.startPoints) * d.playerCount;
    rerenderRulePreserve();
  },
  applyRatePreset(v){ UI.ruleDraft.rate=v; rerenderRulePreserve(); },
  applyChipPreset(v){ UI.ruleDraft.chipValue=v; rerenderRulePreserve(); },
  updateReturnPoints(val){

    updateAxisDisplay();
  },
  addSpecialTile(){
    UI.ruleDraft.specialTiles = UI.ruleDraft.specialTiles || [];
    UI.ruleDraft.specialTiles.push({name:'', effect:''});
    rerenderRulePreserve();
  },
  removeSpecialTile(idx){
    UI.ruleDraft.specialTiles.splice(idx,1);
    rerenderRulePreserve();
  },
  updateSpecialTile(idx,key,val){
    UI.ruleDraft.specialTiles[idx][key]=val;
  },
  addExtraYakuman(type){
    UI.ruleDraft.extraYakuman = UI.ruleDraft.extraYakuman || [];
    UI.ruleDraft.extraYakuman.push({type: type||'daisharin', text:''});
    rerenderRulePreserve();
  },
  removeExtraYakuman(idx){
    UI.ruleDraft.extraYakuman.splice(idx,1);
    rerenderRulePreserve();
  },
  updateExtraYakumanType(idx,val){
    UI.ruleDraft.extraYakuman[idx].type=val;
    rerenderRulePreserve();
  },
  updateExtraYakumanText(idx,val){
    UI.ruleDraft.extraYakuman[idx].text=val;
  },
  saveRule(){
    const d=UI.ruleDraft;
    d.name = d.name && d.name.trim() ? d.name.trim() : '無題のルール';
    d.startPoints=numOrZero(d.startPoints);
    d.returnPoints=numOrZero(d.returnPoints);
    d.oka=numOrZero(d.oka);
    d.tobiPenalty=numOrZero(d.tobiPenalty);
    d.akaDoraMan=numOrZero(d.akaDoraMan);
    d.akaDoraPin=numOrZero(d.akaDoraPin);
    d.akaDoraSou=numOrZero(d.akaDoraSou);
    d.notenPenalty=numOrZero(d.notenPenalty);
    d.rate=numOrZero(d.rate);
    d.chipValue=numOrZero(d.chipValue);
    d.yakumanTsumoChip=numOrZero(d.yakumanTsumoChip);
    d.yakumanRonChip=numOrZero(d.yakumanRonChip);
    d.roundingThresholdValue=numOrZero(d.roundingThresholdValue);
    d.kazoeYakumanHan=numOrZero(d.kazoeYakumanHan);
    d.shibariHan=numOrZero(d.shibariHan);
    if(UI.editingRuleId){ DB.rules[DB.rules.findIndex(r=>r.id===UI.editingRuleId)]=d; }
    else{ DB.rules.push(d); }
    persist('rules');
    UI.ruleDraft=null;
    document.getElementById('modalRoot').innerHTML='';
    render();
  },

  viewRuleDetail(id){
    UI.ruleDetailId = id;
    renderRuleDetailModal();
  },
  closeRuleDetail(){ UI.ruleDetailId=null; document.getElementById('modalRoot').innerHTML=''; },
  editFromDetail(id){ Settings.closeRuleDetail(); Settings.editRule(id); },
  removeFromDetail(id){ Settings.closeRuleDetail(); Settings.removeRule(id); },

  async shareRule(id){
    if(!fbAuth || !currentUser){ renderInfoModal('ログインが必要です','ルールを転送するにはログインが必要です。設定→アカウントからログインしてください。'); return; }
    const rule = getRule(id);
    if(!rule) return;
    const code = Math.random().toString(36).slice(2,8).toUpperCase();
    try{
      await fbDb.collection('mahjong_shared_rules').doc(code).set({
        rule: JSON.stringify(rule),
        sharedBy: currentUser.email || currentUser.uid,
        sharedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      UI.shareCode = code;
      renderShareCodeModal();
    }catch(e){
      console.error(e);
      renderInfoModal('転送に失敗しました','転送用コードの作成に失敗しました。通信環境をご確認ください。');
    }
  },
  closeShareCode(){ UI.shareCode=null; document.getElementById('modalRoot').innerHTML=''; },

  forceSync(){
    if(!fbAuth || !currentUser){ renderInfoModal('ログインが必要です','クラウド同期にはログインが必要です。'); return; }
    if(!confirm('この端末のデータでクラウドを上書きします。他の端末での未同期の変更があれば消える場合があります。続行しますか？')) return;
    queueCloudPush(true);
    renderInfoModal('同期を開始しました','この端末のデータをクラウドに送信しています。');
  },

  openReceiveRuleModal(){
    UI.receiveCode='';
    renderReceiveRuleModal();
  },
  updateReceiveCode(val){ UI.receiveCode = val.toUpperCase(); },
  closeReceiveRule(){ UI.receiveCode=null; document.getElementById('modalRoot').innerHTML=''; },
  async receiveRuleByCode(){
    if(!fbAuth || !currentUser){ renderInfoModal('ログインが必要です','ルールを受け取るにはログインが必要です。設定→アカウントからログインしてください。'); return; }
    const code = (UI.receiveCode||'').trim();
    if(!code){ renderInfoModal('コード未入力','コードを入力してください。'); return; }
    try{
      const doc = await fbDb.collection('mahjong_shared_rules').doc(code).get();
      if(!doc.exists){ renderInfoModal('見つかりません','そのコードは見つかりませんでした。コードをご確認ください。'); return; }
      const rule = ensureRuleDefaults(JSON.parse(doc.data().rule));
      rule.id = uid();
      rule.name = rule.name + '（受け取り）';
      DB.rules.push(rule);
      persist('rules');
      UI.receiveCode=null;
      renderInfoModal('受け取りました','ルール「'+rule.name+'」を受け取りました。');
      render();
    }catch(e){
      console.error(e);
      renderInfoModal('受け取りに失敗しました','コードと通信環境をご確認ください。');
    }
  }
};

/* ウマの「計算軸」= returnPoints/1000 - uma（同点狙いのしきい値）をDOM直接更新（入力中の再描画を避けるため） */
function updateAxisDisplay(){
  const d=UI.ruleDraft;
  if(!d) return;
  d.uma.forEach((v,i)=>{
    if(i===0) return; // 1位は計算軸を表示しない
    const el=document.getElementById('axis-'+i);
    if(el){ const axis = (d.returnPoints/1000) - v; el.textContent = axis.toFixed(1)+''; }
  });
}

/* トグルやプリセット変更時、スクロール位置を保ったまま再描画する（新規オープン時は0のまま） */
function rerenderRulePreserve(){
  const modalEl = document.querySelector('#modalRoot .modal');
  const scrollTop = modalEl ? modalEl.scrollTop : 0;
  renderRuleModal();
  const newModalEl = document.querySelector('#modalRoot .modal');
  if(newModalEl) newModalEl.scrollTop = scrollTop;
}

const YN = v => v ? '○' : '×';

/* 汎用の簡易メッセージモーダル（alertがブロックされる環境でも確実に表示するため） */
function renderInfoModal(title, message){
  document.getElementById('modalRoot').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeInfoModal()">
      <div class="modal">
        <div class="modal-head"><h2>${esc(title)}</h2><button class="close-x" onclick="closeInfoModal()">✕</button></div>
        <div class="small-note">${esc(message)}</div>
        <button class="btn block" style="margin-top:14px" onclick="closeInfoModal()">閉じる</button>
      </div>
    </div>`;
}
function closeInfoModal(){ document.getElementById('modalRoot').innerHTML=''; }
function renderRuleDetailModal(){
  if(!UI.ruleDetailId){ document.getElementById('modalRoot').innerHTML=''; return; }
  const r = getRule(UI.ruleDetailId);
  if(!r){ Settings.closeRuleDetail(); return; }
  const extraYakumanLabel = {daisharin:'大車輪',daisharin_free:'大車輪（ピンズ以外も可）',surenko:'四連刻',manzu_routou:'萬子老頭',nagashi_tanyao:'流しタンヤオ',other:'その他'};
  const rows = [
    ['人数', r.playerCount+'人打ち'],
    ['レート', r.rateEnabled ? ('1000点＝'+r.rate+'円') : 'なし'],
    ['チップ', r.chipEnabled ? (r.chipValue+'円/枚・発動条件:'+({none:'なし',riichi:'リーチ祝儀',menzen:'面前祝儀',naki:'鳴き祝儀'}[r.chipCondition])) : 'なし'],
    ['役満祝儀', r.chipEnabled ? ('ツモ'+r.yakumanTsumoChip+'枚オール/ロン'+r.yakumanRonChip+'枚') : 'なし'],
    ['対局形式', r.gameType==='hanchan'?'半荘戦':'東風戦'],
    ['開始点/返し点', r.startPoints+' / '+r.returnPoints],
    ['連チャン方式', {tenpai_keishiki:'聴牌連（形式聴牌あり）',tenpai_yaku:'聴牌連（役あり聴牌のみ）',nagare:'流局連',none:'連荘なし'}[r.renchanType]],

/* ============ スコア（対局結果）の他アカウントへの送信 ============ */
const ScoreShare = {
  async shareSession(sessionId){
    if(!fbAuth || !currentUser){ renderInfoModal('ログインが必要です','スコアを送るにはログインが必要です。設定→アカウントからログインしてください。'); return; }
    const s = DB.history.find(x=>x.id===sessionId);
    if(!s) return;
    const rule = getRule(s.ruleId);
    const payload = {
      date: s.date,
      ruleName: rule?rule.name:'不明なルール',
      rule: rule||null,
      players: s.players.map(p=>({name:memberName(p.memberId), rawScore:p.rawScore, rank:p.rank, point:p.point}))
    };
    const code = Math.random().toString(36).slice(2,8).toUpperCase();
    try{
      await fbDb.collection('mahjong_shared_scores').doc(code).set({
        payload: JSON.stringify(payload),
        sharedBy: currentUser.email || currentUser.uid,
        sharedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      UI.scoreShareCode = code;
      renderScoreShareCodeModal();
    }catch(e){ console.error(e); renderInfoModal('送信に失敗しました','送信用コードの作成に失敗しました。通信環境をご確認ください。'); }
  },
  closeScoreShareCode(){ UI.scoreShareCode=null; document.getElementById('modalRoot').innerHTML=''; },
  openReceiveModal(){ UI.receiveScoreCode=''; renderReceiveScoreModal(); },
  updateReceiveCode(val){ UI.receiveScoreCode = val.toUpperCase(); },
  closeReceive(){ UI.receiveScoreCode=null; document.getElementById('modalRoot').innerHTML=''; },
  async receiveByCode(){
    if(!fbAuth || !currentUser){ renderInfoModal('ログインが必要です','受け取るにはログインが必要です。設定→アカウントからログインしてください。'); return; }
    const code=(UI.receiveScoreCode||'').trim();
    if(!code){ renderInfoModal('コード未入力','コードを入力してください。'); return; }
    try{
      const doc = await fbDb.collection('mahjong_shared_scores').doc(code).get();
      if(!doc.exists){ renderInfoModal('見つかりません','コードが見つかりませんでした。ご確認ください。'); return; }
      const payload = JSON.parse(doc.data().payload);
      let rule = DB.rules.find(r=>r.name===payload.ruleName);
      if(!rule && payload.rule){
        rule = ensureRuleDefaults({...payload.rule, id:uid()});
        DB.rules.push(rule);
      }
      if(!rule) rule = DB.rules[0];
      const players = (payload.players||[]).map(p=>{
        let m = DB.members.find(mm=>mm.name===p.name);
        if(!m){
          m = {id:uid(), name:p.name, color: PALETTE[DB.members.length % PALETTE.length]};
          DB.members.push(m);
        }
        return {memberId:m.id, rawScore:p.rawScore, rank:p.rank, point:p.point};
      });
      DB.history.push({id:uid(), date:payload.date, ruleId:rule.id, players});
      persist('members'); persist('rules'); persist('history');
      UI.receiveScoreCode=null;
      renderInfoModal('受け取りました','スコアを受け取りました。');
      render();
    }catch(e){ console.error(e); renderInfoModal('受け取りに失敗しました','コードと通信環境をご確認ください。'); }
  }
};

/* ============ アプリの更新確認 ============ */
const APP_VERSION = document.querySelector('meta[name="app-version"]').content;
async function checkForUpdate(){
  try{
    const res = await fetch(location.href.split('#')[0].split('?')[0] + '?_=' + Date.now(), {cache:'no-store'});
    const text = await res.text();
    const m = text.match(/<meta name="app-version" content="([^"]+)">/);
    if(m && m[1] && m[1] !== APP_VERSION){
      const banner = document.getElementById('updateBanner');
      if(banner) banner.style.display = 'flex';
    }
  }catch(e){ /* オフライン等は静かに無視 */ }
}
// バックグラウンドで自動的に確認（起動時・5分ごと・タブ復帰時）。実際の更新はボタン操作で行う
setTimeout(checkForUpdate, 4000);
setInterval(checkForUpdate, 5*60*1000);
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') checkForUpdate(); });
</script>
