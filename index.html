/* 汎用の確認モーダル（削除・ログアウトなど破壊的操作の確認用。confirm()の代わりに使用） */
let _confirmModalCallback = null;
let _confirmModalCancelCallback = null;
function showConfirmModal(title, message, onConfirm, confirmLabel, onCancel){
  _confirmModalCallback = onConfirm;
  _confirmModalCancelCallback = onCancel || null;
  document.getElementById('modalRoot').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) cancelConfirmModal()">
      <div class="modal">
        <div class="modal-head"><h2>${esc(title)}</h2><button class="close-x" onclick="cancelConfirmModal()">✕</button></div>
        <div class="small-note" style="white-space:pre-line">${esc(message)}</div>
        <div class="row" style="margin-top:16px;gap:8px">
          <button class="btn secondary grow" onclick="cancelConfirmModal()">キャンセル</button>
          <button class="btn danger grow" onclick="runConfirmModal()">${esc(confirmLabel||'実行する')}</button>
        </div>
      </div>
    </div>`;
}
function closeConfirmModal(){ _confirmModalCallback=null; _confirmModalCancelCallback=null; document.getElementById('modalRoot').innerHTML=''; }
function cancelConfirmModal(){
  const cb=_confirmModalCancelCallback;
  _confirmModalCallback=null; _confirmModalCancelCallback=null;
  if(cb) cb(); else document.getElementById('modalRoot').innerHTML='';
}
function runConfirmModal(){ const cb=_confirmModalCallback; closeConfirmModal(); if(cb) cb(); }
function renderRuleDetailModal(){
  if(!UI.ruleDetailId){ document.getElementById('modalRoot').innerHTML=''; return; }
  const r = getRule(UI.ruleDetailId);
  if(!r){ Settings.closeRuleDetail(); return; }
  const extraYakumanLabel = {daisharin:'大車輪',daisharin_free:'大車輪（ピンズ以外も可）',surenko:'四連刻',manzu_routou:'萬子老頭',nagashi_tanyao:'流しタンヤオ',other:'その他'};
  const rows = [
    ['人数', r.playerCount+'人打ち'],
    ['参加メンバー', (()=>{ const ms=DB.members.filter(m=>!m.excludedRuleIds||!m.excludedRuleIds.includes(r.id)); return ms.length? ms.map(m=>esc(m.name)).join('・') : 'なし'; })()],
    ['レート', r.rateEnabled ? ('1000点＝'+r.rate+'P') : 'なし'],
    ['チップ', r.chipEnabled ? (r.chipValue+'P/枚・発動条件:'+({none:'なし',riichi:'リーチ祝儀',menzen:'面前祝儀',naki:'鳴き祝儀'}[r.chipCondition])) : 'なし'],
    ['役満祝儀', r.chipEnabled ? ('ツモ'+r.yakumanTsumoChip+'枚オール/ロン'+r.yakumanRonChip+'枚') : 'なし'],
    ['対局形式', r.gameType==='hanchan'?'半荘戦':'東風戦'],
    ['開始点/返し点', r.startPoints+' / '+r.returnPoints],
    ['点棒', '500点棒:'+YN(r.stick500Enabled)+' / 100点棒:'+YN(r.stick100Enabled)],
    ['連チャン方式', {tenpai_keishiki:'聴牌連（形式聴牌あり）',tenpai_yaku:'聴牌連（役あり聴牌のみ）',nagare:'流局連',none:'連荘なし'}[r.renchanType]],
    ['縛り', {none:'縛りなし',deai:'出上がり2飜（偶然2飜）',kanzen:'完全2飜（確定2飜）',other:'その他('+r.shibariHan+'飜)'}[r.shibariType]],
    ['ウマ', r.uma.join(' / ')],
    ['オカ（追加ボーナス）', r.okaEnabled ? r.oka : 'なし'],
    ['場代', r.babaEnabled ? (r.babaFromRank+'着のみ1人'+r.babaAmount+'点') : 'なし'],
    ['符計算/ツモ損', YN(r.fuCalculation)+' / '+YN(r.tsumoLoss)],
    ['同点の際のルール', r.tiebreakRule==='atamahane' ? '頭ハネ（着順を決める）' : '折半（同着扱い）'],
    ['喰いタン/後付け/ツモピン', YN(r.kuitanAri)+' / '+YN(r.atozukeAri)+' / '+YN(r.tsumoPinAri)],
    ['一発/裏ドラ/カン裏', YN(r.ippatsuAri)+' / '+YN(r.uradoraAri)+' / '+YN(r.kanUradoraAri)],
    ['トビ終了', r.tobiAri ? ((r.tobiRule==='zero'?'0点で終了':'0点継続(-100以下)')+'・罰符'+r.tobiPenalty) : 'なし'],
    ['赤ドラ', r.akaDoraEnabled ? `萬${r.akaDoraMan}/筒${r.akaDoraPin}/索${r.akaDoraSou}` : 'なし'],
    ['ノーテン罰符', r.notenPenaltyEnabled ? r.notenPenalty+'（場の合計）' : 'なし'],
    ['積み棒', r.tsumiboEnabled ? r.tsumiboValue+'点/本' : 'なし'],
    ['フリテン', r.furitenAri ? (r.furitenOpenRequired==='required'?'オープン必要':'オープン不要') : 'なし'],
    ['ダブロン', r.doubleRonAri ? 'ダブロンあり' : '頭ハネ'],
    ...(r.playerCount===4 ? [['トリロン', r.tripleRonAri ? 'トリロンあり' : 'トリロンの場合流局']] : []),
    ['流し', r.nagashiEnabled ? ({mangan:'流し満貫',haneman:'流し跳満',baiman:'流し倍満',sanbaiman:'流し3倍満',yakuman:'流し役満'}[r.nagashiTier]+'・チップ発動:'+YN(r.nagashiChipEnabled)) : 'なし'],
    ['追加役', [r.sanpuuAri?'三風':null, r.sanrenkouAri?'三連刻':null, (r.otherYakuEnabled&&r.otherYakuText)?r.otherYakuText:null].filter(Boolean).join('・') || 'なし'],
    ['数え役満', r.kazoeYakumanEnabled ? (r.kazoeYakumanHan+'翻・役満祝儀:'+YN(r.kazoeYakumanChipAri)) : 'なし'],
    ['役満', [r.kokushiAnkanAri?'国士無双の暗槓上がりあり':null, r.paoAri?'パオ（責任払い）あり':null].filter(Boolean).join('・') || 'なし'],
    ['追加役満', (r.extraYakuman||[]).length ? r.extraYakuman.map(y=>y.type==='other'?(y.text||'その他'):extraYakumanLabel[y.type]).join('・') : 'なし'],

/* ============ スコア（対局結果）の他アカウントへの送信 ============ */
const ScoreShare = {
  async shareSession(sessionId){
    if(!fbAuth || !currentUser){ renderInfoModal('ログインが必要です','スコアを送るにはログインが必要です。設定→アカウントからログインしてください。'); return; }
    const s = DB.history.find(x=>x.id===sessionId);
    if(!s) return;
    const rule = getRule(s.ruleId);
    const payload = {
      date: s.date,
      ruleName: rule?rule.name:'不明なルール',
      rule: rule||null,
      players: s.players.map(p=>({name:memberName(p.memberId), rawScore:p.rawScore, rank:p.rank, point:p.point, color:memberColor(p.memberId)}))
    };
    const code = Math.random().toString(36).slice(2,8).toUpperCase();
    try{
      await fbDb.collection('mahjong_shared_scores').doc(code).set({
        payload: JSON.stringify(payload),
        sharedBy: currentUser.email || currentUser.uid,
        sharedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      UI.scoreShareCode = code;
      renderScoreShareCodeModal();
    }catch(e){ console.error(e); renderInfoModal('送信に失敗しました', firestoreErrorMessage(e, 'mahjong_shared_scores')); }
  },
  closeScoreShareCode(){ UI.scoreShareCode=null; document.getElementById('modalRoot').innerHTML=''; },
  openReceiveModal(){ UI.receiveScoreCode=''; renderReceiveScoreModal(); },
  updateReceiveCode(val){ UI.receiveScoreCode = val.toUpperCase(); },
  closeReceive(){ UI.receiveScoreCode=null; document.getElementById('modalRoot').innerHTML=''; },
  async receiveByCode(){
    if(!fbAuth || !currentUser){ renderInfoModal('ログインが必要です','受け取るにはログインが必要です。設定→アカウントからログインしてください。'); return; }
    const code=(UI.receiveScoreCode||'').trim();
    if(!code){ renderInfoModal('コード未入力','コードを入力してください。'); return; }
    try{
      const doc = await fbDb.collection('mahjong_shared_scores').doc(code).get();
      if(!doc.exists){ renderInfoModal('見つかりません','コードが見つかりませんでした。ご確認ください。'); return; }
      const payload = JSON.parse(doc.data().payload);
      let rule = DB.rules.find(r=>r.name===payload.ruleName);
      if(!rule && payload.rule){
        rule = ensureRuleDefaults({...payload.rule, id:uid()});
        DB.rules.push(rule);
      }
      if(!rule) rule = DB.rules[0];
      const names = (payload.players||[]).map(p=>p.name);
      const colorsByName = {};
      (payload.players||[]).forEach(p=>{ if(p.color) colorsByName[p.name]=p.color; });
      resolveMemberNames(names, (nameToId)=>{
        const players = (payload.players||[]).map(p=>({memberId:nameToId[p.name], rawScore:p.rawScore, rank:p.rank, point:p.point}));
        DB.history.push({id:uid(), date:payload.date, ruleId:rule.id, players});
        persist('members'); persist('rules'); persist('history');
        UI.receiveScoreCode=null;
        renderInfoModal('受け取りました','スコアを受け取りました。');
        render();
      }, colorsByName);
    }catch(e){ console.error(e); renderInfoModal('受け取りに失敗しました', firestoreErrorMessage(e, 'mahjong_shared_scores')); }
  }
};

function renderScoreShareCodeModal(){
  if(!UI.scoreShareCode){ return; }
  const html=`
  <div class="modal-overlay" onclick="if(event.target===this) ScoreShare.closeScoreShareCode()">
    <div class="modal">
      <div class="modal-head"><h2>スコアを送る</h2><button class="close-x" onclick="ScoreShare.closeScoreShareCode()">✕</button></div>
      <div class="small-note" style="margin-bottom:14px">下のコードを相手に伝えてください。相手側の「設定→アカウント→コードでスコアを受け取る」からこのコードを入力すると、そのアカウントの履歴に追加されます（メンバー名が一致しない場合は新規メンバーとして追加されます）。</div>
      <div style="text-align:center;font-size:32px;font-weight:800;letter-spacing:4px;color:var(--accent-dark);background:var(--accent-light);border-radius:14px;padding:20px 10px;margin-bottom:14px">${UI.scoreShareCode}</div>
      <button class="btn block" onclick="navigator.clipboard && navigator.clipboard.writeText('${UI.scoreShareCode}'); renderInfoModal('コピーしました','コードをクリップボードにコピーしました。')">コードをコピー</button>
    </div>
  </div>`;
  document.getElementById('modalRoot').innerHTML=html;
}

function renderReceiveScoreModal(){
  if(UI.receiveScoreCode===null || UI.receiveScoreCode===undefined){ return; }
  const html=`
  <div class="modal-overlay" onclick="if(event.target===this) ScoreShare.closeReceive()">
    <div class="modal">
      <div class="modal-head"><h2>コードでスコアを受け取る</h2><button class="close-x" onclick="ScoreShare.closeReceive()">✕</button></div>
      <div class="field-wrap"><label class="field">相手から受け取ったコード</label>
        <input type="text" value="${esc(UI.receiveScoreCode)}" oninput="ScoreShare.updateReceiveCode(this.value)" placeholder="例：A1B2C3" style="text-transform:uppercase;letter-spacing:2px;font-weight:700"></div>
      <button class="btn block" onclick="ScoreShare.receiveByCode()">受け取る</button>
    </div>
  </div>`;
  document.getElementById('modalRoot').innerHTML=html;
}

/* ============ 共通描画 ============ */
function render(){
  document.querySelectorAll('.tabbar .tab').forEach(el=>{ el.classList.toggle('active', el.dataset.tab===UI.tab); });
  const hd=document.getElementById('headerDate');
  if(hd) hd.textContent = fmtDate(todayStr());
  if(UI.tab==='home') renderHome();
  else if(UI.tab==='history') renderHistory();
  else if(UI.tab==='analysis') renderAnalysis();
  else if(UI.tab==='ranking') renderRanking();
  else if(UI.tab==='settings') renderSettings();
}

/* ============ アプリの更新確認 ============ */
const APP_VERSION = document.querySelector('meta[name="app-version"]').content;
async function checkForUpdate(){
  try{
    const res = await fetch(location.href.split('#')[0].split('?')[0] + '?_=' + Date.now(), {cache:'no-store'});
    const text = await res.text();
    const m = text.match(/<meta name="app-version" content="([^"]+)">/);
    if(m && m[1] && m[1] !== APP_VERSION){
      const banner = document.getElementById('updateBanner');
      if(banner) banner.style.display = 'flex';
    }
  }catch(e){ /* オフライン等は静かに無視 */ }
}
// バックグラウンドで自動的に確認（起動時・5分ごと・タブ復帰時）。実際の更新はボタン操作で行う
setTimeout(checkForUpdate, 4000);
setInterval(checkForUpdate, 5*60*1000);
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') checkForUpdate(); });
</script>
