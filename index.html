<title>麻雀スコア管理</title>
<meta name="app-version" content="2026.07.15-1">
<!-- Firebase Compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
:root{
  --accent:#2f8f5f;
  --accent2:#1f7a52;
  --accent-dark:#0f2e20;
  --accent-light:#e7f4ec;
  --bg:#eef1ec;
  --card:#ffffff;
  --text:#1b2420;
  --sub:#67716a;
  --danger:#c0392b;
  --danger-light:#fdecea;
  --warn:#d68910;
  --border:#e1e5dd;
  --gold:#c8912a;
  --gold2:#e6b94a;
  --radius:18px;
  --shadow-card:0 1px 2px rgba(20,40,25,.05), 0 10px 24px -10px rgba(20,40,25,.18);
  --shadow-btn:0 2px 0 rgba(0,0,0,.16), 0 6px 14px -4px rgba(15,46,32,.35);
  --shadow-press:0 1px 0 rgba(0,0,0,.16);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  background:
    radial-gradient(circle at 15% 0%, rgba(47,143,95,.10), transparent 40%),
    var(--bg);
  color:var(--text);
  padding-bottom:82px;
  -webkit-tap-highlight-color:transparent;
}
#app{max-width:720px;margin:0 auto;padding:16px 14px 8px;}
h1,h2,h3{margin:0 0 8px;}

/* ===== ヘッダー ===== */
.header-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:calc(16px + env(safe-area-inset-top)) 18px 16px;
  background:linear-gradient(150deg,#1c503a 0%,#0f2e20 65%);
  color:#fff;position:sticky;top:0;z-index:20;
  box-shadow:0 6px 18px -6px rgba(10,30,20,.55);
  border-radius:0 0 20px 20px;
}
.header-bar .title{font-size:18px;font-weight:800;letter-spacing:.5px;display:flex;align-items:center;gap:7px;}
.header-bar .date{font-size:11.5px;opacity:.75;margin-top:2px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#8a938c;display:inline-block;box-shadow:0 0 0 3px rgba(255,255,255,.08);}
.sync-dot.on{background:#57e39a;box-shadow:0 0 0 3px rgba(87,227,154,.18);}

/* ===== カード ===== */
.card{
  background:var(--card);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:14px;
  box-shadow:var(--shadow-card);
  border:1px solid rgba(255,255,255,.6);
}
.card h3{font-size:14px;color:var(--sub);font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;}

/* ===== ボタン ===== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:none;border-radius:13px;padding:12px 18px;font-size:14.5px;font-weight:700;
  cursor:pointer;color:#fff;
  background:linear-gradient(180deg,var(--accent) 0%,var(--accent2) 100%);
  box-shadow:var(--shadow-btn);
  transition:transform .08s ease, box-shadow .08s ease;
}
.btn:active{transform:translateY(2px);box-shadow:var(--shadow-press);}
.btn.secondary{background:linear-gradient(180deg,#fdfdfb,#eef1ec);color:var(--accent-dark);box-shadow:0 1px 0 rgba(0,0,0,.05), 0 3px 8px -2px rgba(20,40,25,.15);}
.btn.danger{background:linear-gradient(180deg,#f4c9c2,#e7a79d);color:#7a2015;box-shadow:0 2px 0 rgba(0,0,0,.08),0 4px 10px -2px rgba(192,57,43,.35);}
.btn.ghost{background:transparent;color:var(--accent2);box-shadow:none;border:1.5px solid var(--accent2);}
.btn.block{width:100%;}
.btn.sm{padding:8px 12px;font-size:12.5px;border-radius:10px;}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none;}

.row{display:flex;gap:8px;}
.row.wrap{flex-wrap:wrap;}
.grow{flex:1;}

/* ===== チップ ===== */
.chip{
  display:inline-flex;align-items:center;gap:6px;padding:9px 14px;border-radius:999px;
  background:#fff;color:var(--accent-dark);font-size:13.5px;font-weight:700;
  border:1.5px solid var(--border);cursor:pointer;
  box-shadow:0 1px 2px rgba(0,0,0,.04);
  transition:.15s;
}
.chip .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
.chip.selected{background:linear-gradient(180deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;box-shadow:0 3px 10px -2px rgba(31,122,82,.55);}
.chip.disabled{opacity:.32;cursor:not-allowed;}

label.field{display:block;font-size:12.5px;color:var(--sub);margin-bottom:5px;font-weight:700;}
input[type=text],input[type=email],input[type=password],input[type=number],select,textarea{
  width:100%;padding:11px 12px;border-radius:11px;border:1.5px solid var(--border);
  font-size:15px;background:#fbfbf9;color:var(--text);
  box-shadow:inset 0 1px 3px rgba(0,0,0,.04);
}
input:disabled{opacity:.4;background:#f1f1ec;}
textarea{resize:vertical;min-height:52px;font-family:inherit;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);background:#fff;}
.field-wrap{margin-bottom:13px;}
.hint{font-size:11.5px;color:var(--sub);margin-top:4px;line-height:1.6;}

/* ===== トグルスイッチ ===== */
.opt-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;}
.opt-row .opt-label{font-size:13.5px;font-weight:700;color:var(--text);}
.opt-row .opt-sub{font-size:11px;color:var(--sub);margin-top:2px;}
.switch{position:relative;display:inline-block;width:48px;height:28px;flex-shrink:0;}
.switch input{opacity:0;width:0;height:0;position:absolute;}
.slider{position:absolute;inset:0;background:#d8d4c8;border-radius:999px;transition:.2s;box-shadow:inset 0 1px 3px rgba(0,0,0,.18);cursor:pointer;}
.slider:before{content:'';position:absolute;width:22px;height:22px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 2px 5px rgba(0,0,0,.3);}
.switch input:checked + .slider{background:linear-gradient(180deg,#45c084,var(--accent2));}
.switch input:checked + .slider:before{transform:translateX(20px);}

/* ===== タブバー ===== */
.tabbar{
  position:fixed;bottom:10px;left:10px;right:10px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(10px);
  border-radius:20px;display:flex;z-index:30;
  box-shadow:0 10px 30px -8px rgba(15,40,28,.35), 0 1px 0 rgba(255,255,255,.6) inset;

}
.tabbar .tab{
  flex:1;text-align:center;padding:8px 4px;font-size:10.5px;color:var(--sub);
  display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;
  border-radius:14px;transition:.15s;
}
.tabbar .tab .ico{font-size:19px;}
.tabbar .tab.active{color:#fff;background:linear-gradient(180deg,var(--accent),var(--accent2));font-weight:800;box-shadow:0 4px 10px -2px rgba(31,122,82,.5);}

.score-board{width:100%;border-collapse:collapse;}
.score-board th,.score-board td{padding:10px 6px;text-align:left;font-size:13.5px;border-bottom:1px solid var(--border);}
.score-board th{color:var(--sub);font-weight:700;font-size:11px;}
.score-board tr:last-child td{border-bottom:none;}
.score-board tr{cursor:default;}
.rank1{color:var(--gold);font-weight:800;}
.pos{color:#1a7a45;font-weight:800;}
.neg{color:var(--danger);font-weight:800;}

.session-card{border:1px solid var(--border);border-radius:15px;padding:12px 13px;margin-bottom:10px;background:linear-gradient(180deg,#fff,#fbfbf8);box-shadow:0 1px 2px rgba(0,0,0,.03);}
.session-card .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.session-card .meta .d{font-size:12px;color:var(--sub);font-weight:600;}
.session-card .players{display:flex;flex-wrap:wrap;gap:6px;font-size:12.5px;}
.session-card .players span{background:var(--accent-light);padding:4px 9px;border-radius:9px;display:inline-flex;align-items:center;gap:5px;}
.session-card .actions{margin-top:9px;display:flex;gap:8px;}

.modal-overlay{
  position:fixed;inset:0;background:rgba(10,20,15,.5);z-index:50;
  display:flex;align-items:flex-end;justify-content:center;
}
.modal{

.modal .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.modal .modal-head h2{font-size:18px;}
.close-x{font-size:20px;color:var(--sub);background:#f1f1ec;border:none;cursor:pointer;padding:6px 10px;border-radius:10px;}

.section-title{font-size:12.5px;font-weight:800;color:var(--accent-dark);margin:18px 0 8px;padding-top:12px;border-top:1.5px dashed var(--border);letter-spacing:.3px;}
.section-title:first-child{border-top:none;margin-top:0;}

.empty-state{text-align:center;padding:34px 10px;color:var(--sub);}
.empty-state .big{font-size:38px;margin-bottom:10px;}

.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:10px;}
.stat-box{background:linear-gradient(180deg,#f3f8f4,var(--accent-light));border-radius:13px;padding:12px 8px;text-align:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.7);}
.stat-box .v{font-size:19px;font-weight:800;color:var(--accent-dark);}

.member-row,.rule-row{

.rule-row .sub{font-size:11.5px;color:var(--sub);margin-top:2px;}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:13px;box-shadow:0 2px 5px rgba(0,0,0,.2);flex-shrink:0;}

.sub-tabs{display:flex;gap:8px;margin-bottom:14px;background:#fff;padding:5px;border-radius:14px;box-shadow:var(--shadow-card);}
.sub-tabs .st{flex:1;text-align:center;padding:9px;border-radius:10px;color:var(--sub);font-size:13px;font-weight:800;cursor:pointer;}
.sub-tabs .st.active{background:linear-gradient(180deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 3px 8px -2px rgba(31,122,82,.5);}

.diff-ok{color:#1a7a45;font-weight:700;}
.diff-bad{color:var(--danger);font-weight:700;}
.uma-input-row{display:flex;gap:8px;align-items:center;margin-bottom:7px;}

.hako-btn{padding:0 14px;height:44px;border-radius:10px;border:1.5px solid var(--border);background:#fff;color:var(--sub);font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;}

.drum-wheel{

.drum-wheel-item{height:36px;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:800;color:var(--text);scroll-snap-align:center;}
.drum-wheel-pad{height:36px;scroll-snap-align:center;}
.mode-switch{display:flex;gap:8px;margin-bottom:14px;background:#f1efe9;padding:4px;border-radius:12px;}
.mode-switch .ms-opt{flex:1;text-align:center;padding:8px;border-radius:9px;font-size:12.5px;font-weight:700;color:var(--sub);cursor:pointer;}
.mode-switch .ms-opt.active{background:linear-gradient(180deg,var(--accent),var(--accent2));color:#fff;}
.fab-record{

.color-swatches{display:flex;gap:9px;flex-wrap:wrap;margin-top:6px;}
.swatch{width:34px;height:34px;border-radius:50%;cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,.2);border:3px solid transparent;}

.opp-table td,.opp-table th{padding:8px 6px;}

  background:radial-gradient(circle at 20% 10%, rgba(47,143,95,.18), transparent 45%), var(--bg);
}

  width:100%;max-width:400px;background:#fff;border-radius:24px;padding:30px 24px;
  box-shadow:0 20px 50px -14px rgba(15,40,28,.35);
}
</style>
</head>
<body>

<div id="gate-root" style="display:none">
  <div class="gate-card" id="gate-card"></div>
</div>

<div id="app-shell" style="display:none">
<div id="updateBanner" style="display:none;position:sticky;top:0;z-index:25;background:var(--gold2);color:#3a2c05;padding:10px 16px;font-size:13px;font-weight:700;justify-content:space-between;align-items:center;gap:10px">
  <span>新しいバージョンがあります</span>
  <div style="display:flex;gap:6px">
    <button class="btn sm" style="background:#3a2c05" onclick="location.reload(true)">更新する</button>
    <button class="btn sm secondary" onclick="document.getElementById('updateBanner').style.display='none'">後で</button>
  </div>
</div>
<div class="header-bar">
  <div>
    <div class="title">🀄 麻雀スコア管理</div>
    <div class="date" id="headerDate"></div>
  </div>
  <div class="row" style="align-items:center;gap:10px">
    <span class="sync-dot" id="syncDot" title="同期状態"></span>
    <span id="accountName" style="color:rgba(255,255,255,.8);font-size:11.5px;font-weight:700"></span>
  </div>
</div>

<div id="app"></div>

<div class="tabbar">
  <div class="tab" data-tab="home" onclick="Router.go('home')"><div class="ico">🏠</div>ホーム</div>
  <div class="tab" data-tab="history" onclick="Router.go('history')"><div class="ico">📜</div>履歴</div>
  <div class="tab" data-tab="analysis" onclick="Router.go('analysis')"><div class="ico">📊</div>データ</div>
  <div class="tab" data-tab="settings" onclick="Router.go('settings')"><div class="ico">⚙</div>設定</div>
</div>
</div>

<div id="modalRoot"></div>

<script>
/* ============ Firebase 設定（複数端末同期用） ============ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAv35i4MSksru9csqLBbtZvHEJbWfaVQGs",
  authDomain: "boat-d715f.firebaseapp.com",
  projectId: "boat-d715f",
  storageBucket: "boat-d715f.firebasestorage.app",
  messagingSenderId: "143618120714",
  appId: "1:143618120714:web:8fe8f3548ada361d5053f3",
  measurementId: "G-JPB6Y4GNP0"
};
const COLLECTION = 'mahjong_setscore';
const SKIP_KEY = 'mj_auth_skip';
const LS_KEY = 'mj_data_v2';

let fbApp=null, fbAuth=null, fbDb=null, currentUser=null;
let cloudPushTimer=null, authTabMode='login';
let _unsubscribeSnapshot=null, _isUploading=false;

function userDocRef(){ return fbDb.collection(COLLECTION).doc(currentUser.uid); }

function initFirebase(){
  if(typeof firebase === 'undefined'){
    console.warn('Firebase SDKを読み込めなかったため、ローカル保存モードで起動します（プレビュー環境の制限、通信不可などの場合はこちらが表示されます）');
    localStorage.setItem(SKIP_KEY, '1');
    showApp();
    return;
  }
  try{
    fbApp = firebase.initializeApp(FIREBASE_CONFIG);
    fbAuth = firebase.auth();
    fbDb = firebase.firestore();
    fbAuth.onAuthStateChanged(handleAuthChange);
  }catch(e){
    console.error('Firebase init error', e);
    localStorage.setItem(SKIP_KEY, '1');
    showApp();
  }
}

function setSyncDot(on){
  const el = document.getElementById('syncDot');
  if(el) el.classList.toggle('on', !!on);
}

function updateAccountNameDisplay(){
  const el = document.getElementById('accountName');
  if(!el) return;
  el.textContent = (currentUser && currentUser.email) ? currentUser.email.split('@')[0] : '';
}

async function manualRefreshSync(){
  if(!fbAuth || !currentUser){ renderInfoModal('ログインが必要です','クラウド同期にはログインが必要です。'); return; }
  const btn = document.getElementById('refreshSyncBtn');
  if(btn){ btn.disabled = true; btn.textContent = '更新中…'; }
  try{
    const doc = await userDocRef().get({source:'server'});
    if(doc.exists){
      const remote = JSON.parse(doc.data().payload || '{}');
      DB.rules = remote.rules || DB.rules;
      DB.members = remote.members || DB.members;
      DB.history = remote.history || DB.history;
      DB.chipTx = remote.chipTx || DB.chipTx || [];
      DB.groups = remote.groups || DB.groups || [];
      DB.settlements = remote.settlements || DB.settlements || [];
      DB.rules.forEach(ensureRuleDefaults);
      DB.members.forEach(ensureMemberDefaults);
      localStorage.setItem(LS_KEY, JSON.stringify(DB));
      render();
      renderInfoModal('更新しました','最新のデータを取得しました。');
    }
  }catch(e){
    console.error(e);
    renderInfoModal('更新に失敗しました', firestoreErrorMessage(e, 'mahjong_setscore'));
  }finally{
    if(btn){ btn.disabled = false; btn.textContent = '⟳ 今すぐ更新する'; }
  }
}

function handleAuthChange(user){
  if(_unsubscribeSnapshot){ _unsubscribeSnapshot(); _unsubscribeSnapshot=null; }
  if(user){
    currentUser = user;
    localStorage.removeItem(SKIP_KEY);
    showApp();
    setSyncDot(true);
    updateAccountNameDisplay();
    _unsubscribeSnapshot = userDocRef().onSnapshot(doc=>{
      if(_isUploading) return;
      if(doc.exists){
        try{
          const remote = JSON.parse(doc.data().payload || '{}');
          DB.rules = remote.rules || DB.rules;
          DB.members = remote.members || DB.members;
          DB.history = remote.history || DB.history;
          DB.chipTx = remote.chipTx || DB.chipTx || [];
          DB.groups = remote.groups || DB.groups || [];
      DB.settlements = remote.settlements || DB.settlements || [];
          DB.rules.forEach(ensureRuleDefaults);
          DB.members.forEach(ensureMemberDefaults);
          localStorage.setItem(LS_KEY, JSON.stringify(DB));
          render();
        }catch(e){ console.error('parse error', e); }
      } else {
        queueCloudPush(true);
      }
    }, e=>console.error('snapshot error', e));
  } else {
    currentUser = null;
    setSyncDot(false);
    updateAccountNameDisplay();
    if(localStorage.getItem(SKIP_KEY)==='1'){ showApp(); }
    else{ showGate(); }
  }
}

function queueCloudPush(immediate=false){
  if(!currentUser) return;
  clearTimeout(cloudPushTimer);
  const doWrite = ()=>{
    _isUploading = true;
    userDocRef().set({
      payload: JSON.stringify({rules:DB.rules, members:DB.members, history:DB.history, chipTx:DB.chipTx, groups:DB.groups, settlements:DB.settlements}),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(()=>{ setTimeout(()=>{_isUploading=false;}, 1500); })
    .catch(e=>{ console.error('sync error', e); _isUploading=false; setTimeout(()=>queueCloudPush(true), 3000); });
  };
  if(immediate) doWrite(); else cloudPushTimer=setTimeout(doWrite, 700);
}

function doLogout(){
  if(!fbAuth){ renderInfoModal('ログイン機能が使えません','現在ログイン機能が使えない状態です。'); return; }
  showConfirmModal('ログアウトしますか？', 'ログアウトすると、この端末のキャッシュも削除されます。', ()=>{
    localStorage.removeItem(LS_KEY);
    localStorage.removeItem(SKIP_KEY);
    fbAuth.signOut();
  }, 'ログアウトする');
}

function showGate(){
  document.getElementById('gate-root').style.display='flex';
  document.getElementById('app-shell').style.display='none';
  renderGate();
}
function showApp(){
  document.getElementById('gate-root').style.display='none';
  document.getElementById('app-shell').style.display='';
  render();
}

function renderGate(errorMsg=''){
  const card = document.getElementById('gate-card');
  card.innerHTML = `
    <div style="text-align:center;margin-bottom:26px">
      <div style="font-size:34px;margin-bottom:8px">🀄</div>
      <div style="font-size:21px;font-weight:800;color:var(--text);margin-bottom:6px">麻雀スコア記録</div>
      <div style="font-size:12.5px;color:var(--sub);line-height:1.6">メールアドレスとパスワードでログインすると<br>複数端末でスコアが同期されます</div>
    </div>
    <div style="display:flex;gap:0;margin-bottom:18px;border-radius:12px;overflow:hidden;box-shadow:inset 0 0 0 1.5px var(--border)">
      <button id="gtab-login" style="flex:1;padding:11px;font-size:13px;font-weight:800;border:none;cursor:pointer;font-family:inherit;background:${authTabMode==='login'?'linear-gradient(180deg,var(--accent),var(--accent2))':'#f1f1ec'};color:${authTabMode==='login'?'#fff':'var(--sub)'}" onclick="switchGateTab('login')">ログイン</button>
      <button id="gtab-signup" style="flex:1;padding:11px;font-size:13px;font-weight:800;border:none;cursor:pointer;font-family:inherit;background:${authTabMode==='signup'?'linear-gradient(180deg,var(--accent),var(--accent2))':'#f1f1ec'};color:${authTabMode==='signup'?'#fff':'var(--sub)'}" onclick="switchGateTab('signup')">新規登録</button>
    </div>
    ${errorMsg?`<div style="font-size:12px;color:var(--danger);margin-bottom:14px;padding:11px;background:var(--danger-light);border-radius:10px">${esc(errorMsg)}</div>`:''}
    <div class="field-wrap">
      <label class="field">メールアドレス</label>
      <input id="g-email" type="email" inputmode="email" placeholder="you@example.com">
    </div>
    <div class="field-wrap">
      <label class="field">パスワード（6文字以上）</label>
      <input id="g-password" type="password" placeholder="••••••••">
    </div>
    <button id="g-submit" class="btn block" style="margin-bottom:10px" onclick="doGateAuth()">${authTabMode==='login'?'ログイン':'登録してはじめる'}</button>
    <button class="btn ghost block" onclick="skipLogin()">ログインせずに使う（この端末のみ）</button>
  `;
  setTimeout(()=>{
    const ei=document.getElementById('g-email');
    if(ei) ei.addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('g-password').focus(); });
    const pi=document.getElementById('g-password');
    if(pi) pi.addEventListener('keydown', e=>{ if(e.key==='Enter') doGateAuth(); });
  }, 0);
}

function switchGateTab(mode){ authTabMode=mode; renderGate(); }

function doGateAuth(){
  if(!fbAuth){ renderGate('現在ネットワーク環境の制限によりログイン機能が使えません。「ログインせずに使う」をご利用ください。'); return; }
  const email=document.getElementById('g-email').value.trim();
  const pw=document.getElementById('g-password').value;
  if(!email || pw.length<6){ renderGate('メールアドレスと6文字以上のパスワードを入力してください'); return; }
  const btn=document.getElementById('g-submit');
  btn.textContent='処理中...'; btn.disabled=true;
  const action = authTabMode==='login'
    ? fbAuth.signInWithEmailAndPassword(email, pw)
    : fbAuth.createUserWithEmailAndPassword(email, pw);
  action.catch(err=>{
    const msgs={
      'auth/invalid-email':'メールアドレスの形式が正しくありません',
      'auth/user-not-found':'アカウントが見つかりません。新規登録してください',
      'auth/wrong-password':'パスワードが違います',
      'auth/email-already-in-use':'このメールアドレスは既に登録されています',
      'auth/weak-password':'パスワードは6文字以上にしてください',
      'auth/invalid-credential':'メールアドレスまたはパスワードが違います',
    };
    renderGate(msgs[err.code] || err.message);
  });
}

function skipLogin(){ localStorage.setItem(SKIP_KEY,'1'); showApp(); }

/* ============ ユーティリティ ============ */
const uid = ()=> Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const todayStr = ()=> new Date().toISOString().slice(0,10);
const fmtDate = (s)=>{ const d=new Date(s+'T00:00:00'); return `${d.getMonth()+1}/${d.getDate()}(${['日','月','火','水','木','金','土'][d.getDay()]})`; };
const sign = (n)=> n>0?`+${n}`:`${n}`;
const numOrZero = (v)=>{ const n=parseFloat(v); return isNaN(n)?0:n; };
const PALETTE = ['#e07a5f','#3d8bd4','#f2b134','#6a994e','#9d4edd','#e6538c','#2a9d8f','#c65911','#4a6fa5','#8d6a9f'];
function esc(s){ return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* Firestoreのエラー内容を分かりやすい日本語に変換（転送・同期系の失敗診断用） */
function firestoreErrorMessage(e, collectionName){
  const code = e && e.code;
  if(code === 'permission-denied'){
    const col = collectionName ? `「${collectionName}」` : 'この';
    return `Firestoreのセキュリティルールでこの操作が許可されていません。${col}コレクションへの読み書きが、ログイン済みユーザー（request.auth != null）に許可されているか、Firebaseコンソールでご確認ください。`;
  }
  if(code === 'unavailable' || code === 'deadline-exceeded'){
    return '通信環境が不安定なようです。電波の良い場所でもう一度お試しください。';
  }
  if(code === 'not-found'){
    return 'データが見つかりませんでした。コードをご確認ください。';
  }
  return (e && (e.message || code)) ? ('エラー内容：'+(e.message||code)) : '原因不明のエラーが発生しました。';
}

/* ============ データ層 ============ */
function ensureMemberDefaults(m){
  if(m.isSelf===undefined) m.isSelf=false;
  if(!m.ruleIds) m.ruleIds=[];
  if(!m.aliases) m.aliases=[];
  return m;
}

let DB = { rules:[], members:[], history:[], chipTx:[], groups:[], settlements:[] };
try{
  const saved = JSON.parse(localStorage.getItem(LS_KEY) || 'null');
  if(saved){
    DB = saved;
    if(!DB.chipTx) DB.chipTx=[];

    fuCalculation:true, tsumoLoss:false, tsumoPinAri:true,
    kitaHandling:'nukidora',

  };
  if(typeof r.akaDora==='number' && r.akaDoraMan===undefined){
    r.akaDoraMan = r.akaDora; r.akaDoraPin=0; r.akaDoraSou=0;
  }
  // 赤ドラ枚数：デフォルトは各牌種2枚。3人打ちの場合のみ5萬は0
  if(r.akaDoraMan===undefined) r.akaDoraMan = (r.playerCount===3) ? 0 : 2;

  if(r.shibariType==='kakutei') r.shibariType='kanzen';
  if(r.extraYakuman){
    r.extraYakuman.forEach(y=>{ if(y.type==='surenko_manzu') y.type='surenko'; });

  if(r.kitaHandling===undefined && r.kitaDoraEnabled!==undefined){

  for(const k in def){ if(r[k]===undefined) r[k]=def[k]; }

/* ============ 計算ロジック ============ */
function computeSession(rule, entries, options){
  options = options || {};
  const tobashiTargetId = options.tobashiTargetId || null;
  const tiebreakOrders = options.tiebreakOrders || {};
  const useAtamahane = rule.tiebreakRule==='atamahane';
  // まずスコア降順に並べつつ、同点グループ内は頭ハネの指定順があればその順で並べ替える
  let sorted = [...entries].sort((a,b)=>b.rawScore-a.rawScore);
  if(useAtamahane){
    let idx=0;
    while(idx<sorted.length){
      let j=idx; while(j<sorted.length && sorted[j].rawScore===sorted[idx].rawScore) j++;
      if(j-idx>1){
        const group = sorted.slice(idx,j);
        const key = group.map(e=>e.memberId).slice().sort().join('_');
        const order = tiebreakOrders[key];
        if(order && order.length===group.length){
          group.sort((a,b)=>order.indexOf(a.memberId)-order.indexOf(b.memberId));
          for(let k=idx;k<j;k++) sorted[k]=group[k-idx];
        }
      }
      idx=j;
    }
  }
  const n = sorted.length;
  let ranks=[];
  for(let i=0;i<n;i++){
    if(useAtamahane){ ranks.push(i+1); }
    else{ ranks.push(i>0 && sorted[i].rawScore===sorted[i-1].rawScore ? ranks[i-1] : i+1); }
  }
  const results = sorted.map((e,i)=>({...e, rank:ranks[i]}));
  let i=0;
  while(i<n){
    let j=i; while(j<n && ranks[j]===ranks[i]) j++;
    const count=j-i;
    const slice=(rule.uma||[]).slice(i,j);
    const avg = slice.reduce((a,b)=>a+b,0)/(count||1);
    for(let k=i;k<j;k++) results[k].umaApplied=avg;
    i=j;
  }
  const rank1Count = ranks.filter(r=>r===1).length;
  // 返し点と開始点の差は、収支の合計が必ず0になるよう常に自動で1位に加算する（トップの取り分）
  const autoGapTotal = (rule.returnPoints - rule.startPoints) * n / 1000;
  // 「オカ」はこれとは別に、任意で追加できるボーナス点
  const extraOka = rule.okaEnabled ? (rule.oka||0) : 0;
  const rank1BonusEach = (autoGapTotal + extraOka) / (rank1Count||1);
  const tobiThreshold = rule.tobiRule==='minus100' ? -100 : 0;
  const babaFromRank = rule.babaFromRank || 2;
  const babaAmount = (rule.babaEnabled && rule.babaAmount) ? rule.babaAmount : 0;
  let babaTotal = 0;
  let tobiPenaltyCollected = 0;
  results.forEach(r=>{
    let pt = (r.rawScore - rule.returnPoints)/1000 + (r.umaApplied||0);
    if(r.rank===1) pt += rank1BonusEach;
    if(rule.tobiAri && rule.tobiPenalty && r.rawScore<=tobiThreshold){
      pt -= rule.tobiPenalty;
      tobiPenaltyCollected += rule.tobiPenalty;
    }
    if(babaAmount && r.rank===babaFromRank){
      pt -= babaAmount;
      babaTotal += babaAmount;
    }
    r._pt = pt;
  });
  // 飛ばし：箱下から集めた罰符を、指定した1人にまとめて加算する
  if(tobashiTargetId && tobiPenaltyCollected){
    const target = results.find(r=>r.memberId===tobashiTargetId);
    if(target) target._pt += tobiPenaltyCollected;
  }
  results.forEach(r=>{
    let pt = r._pt;
    if(rule.rounding==='up') pt = Math.ceil(pt*10)/10;
    else if(rule.rounding==='down') pt = Math.floor(pt*10)/10;
    else pt = Math.round(pt*10)/10;
    r.point = pt;
    delete r._pt;
  });
  return { results, babaTotal };
}
function getRule(id){ return DB.rules.find(r=>r.id===id); }

/* ============ その日だけのレート／チップ単価オーバーライド（元のルールは変更しない） ============ */
function getDailyOverride(date, ruleId){
  try{ return JSON.parse(localStorage.getItem(`mj_override_${date}_${ruleId}`) || 'null'); }catch(e){ return null; }
}
function setDailyOverride(date, ruleId, override){
  localStorage.setItem(`mj_override_${date}_${ruleId}`, JSON.stringify(override));
}
function clearDailyOverride(date, ruleId){
  localStorage.removeItem(`mj_override_${date}_${ruleId}`);
}
function getEffectiveRule(rule, date){
  if(!rule) return rule;
  const ov = getDailyOverride(date, rule.id);
  if(!ov) return rule;
  return { ...rule,
    rateEnabled: ov.rateEnabled!==undefined ? ov.rateEnabled : rule.rateEnabled,
    rate: ov.rate!==undefined ? ov.rate : rule.rate,
    chipValue: ov.chipValue!==undefined ? ov.chipValue : rule.chipValue
  };
}
function getMember(id){ return DB.members.find(m=>m.id===id); }
function memberName(id){ const m=getMember(id); return m?m.name:'(削除済み)'; }
function memberColor(id){ const m=getMember(id); return m?m.color:'#999'; }
function yenText(point, rule){
  if(rule && rule.rateEnabled && rule.rate){
    // rate は「1000点あたり◯P」を直接表す値（例：rate=100なら1000点=100P）
    // point は「1000点単位」の最終ポイントなので、P = point × rate
    const yen = Math.round(point*rule.rate);
    return ` <span class="small-note">(${sign(yen)}P)</span>`;
  }
  return '';
}
function avatarHtml(id, size){
  const m = getMember(id);
  const name = m?m.name:'?';
  const color = m?m.color:'#999';
  const s = size||30;
  return `<span class="avatar" style="background:${color};width:${s}px;height:${s}px;font-size:${s*0.42}px">${esc(name.slice(0,1))}</span>`;
}

        <button class="btn secondary grow" onclick="Home.resetRateOverride()">元のルールに戻す</button>
        <button class="btn grow" onclick="Home.saveRateOverride()">今日だけ適用する</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modalRoot').innerHTML = html;
}

/* ============ 対局入力フォーム ============ */
const SCORE_MODE_KEY = 'mj_score_input_mode';
const DRUM_ITEM_H = 36;

const InputForm = {
  _scrollTimers: {},
  open(){
    UI.editingHistoryId=null;
    const rule=getRule(UI.home.ruleId);
    UI.formSign={}; UI.formLeading={}; UI.formEntries={}; UI.formTobashiTarget=null; UI.formTiebreakOrder={};
    UI.home.memberIds.forEach(id=>{
      UI.formSign[id]=1;
      UI.formLeading[id]='';
    });
    UI.formRuleId=rule.id;
    UI.formMemberIds=[...UI.home.memberIds];
    UI.formMemberIds.forEach(mid=>InputForm.composeEntry(mid));
    UI.scoreInputMode = localStorage.getItem(SCORE_MODE_KEY) || 'direct';
    UI.showInputForm=true;
    renderModal();
  },
  openEdit(sessionId){
    const s=DB.history.find(x=>x.id===sessionId);
    if(!s) return;
    UI.editingHistoryId=sessionId;
    UI.formRuleId=s.ruleId;
    UI.formMemberIds=s.players.map(p=>p.memberId);
    const suffixLen = InputForm.currentSuffixLen();
    UI.formSign={}; UI.formLeading={}; UI.formEntries={}; UI.formTobashiTarget=null; UI.formTiebreakOrder={};
    s.players.forEach(p=>{
      const neg = p.rawScore<0;
      const abs = Math.abs(p.rawScore);
      const str = String(abs);
      const leading = str.length>suffixLen ? str.slice(0, str.length-suffixLen) : '0';
      UI.formSign[p.memberId] = neg?-1:1;
      UI.formLeading[p.memberId] = leading;
      InputForm.composeEntry(p.memberId);
    });
    UI.scoreInputMode = localStorage.getItem(SCORE_MODE_KEY) || 'direct';
    UI.showInputForm=true;
    renderModal();
  },
  currentSuffixLen(){
    const rule=getRule(UI.formRuleId);
    return (rule && (rule.stick500Enabled || rule.stick100Enabled)) ? 2 : 3;
  },
  leadingDigitsCount(){ return 6 - InputForm.currentSuffixLen(); },
  composeEntry(mid){
    const suffixLen = InputForm.currentSuffixLen();
    const suffix = '0'.repeat(suffixLen);
    let leading = (UI.formLeading[mid]||'0').replace(/^0+(?=\d)/,'');
    if(leading==='') leading='0';
    UI.formEntries[mid] = (UI.formSign[mid]<0?'-':'') + leading + suffix;
  },
  getDrumDigits(mid){
    const n = InputForm.leadingDigitsCount();
    const padded = (UI.formLeading[mid]||'0').padStart(n,'0').slice(-n);
    return padded.split('');
  },
  setMode(mode){
    UI.scoreInputMode = mode;
    localStorage.setItem(SCORE_MODE_KEY, mode);
    renderModal();
  },
  updateLeading(mid,val){
    UI.formLeading[mid] = val.replace(/[^0-9]/g,'');
    InputForm.composeEntry(mid);
    InputForm.updatePreview(mid);
    updateScoreDiffDisplay();
    updateTiebreakSection();
  },
  toggleSign(mid){
    UI.formSign[mid] = (UI.formSign[mid]||1) * -1;
    InputForm.composeEntry(mid);
    // 箱下の状態が変わったら飛ばし対象の妥当性を再チェック
    const anyBusted = UI.formMemberIds.some(m=>UI.formSign[m]<0);
    if(!anyBusted || UI.formTobashiTarget===mid){ UI.formTobashiTarget=null; }
    renderModal();
  },
  setTobashiTarget(mid){
    UI.formTobashiTarget = (UI.formTobashiTarget===mid) ? null : mid;
    renderModal();
  },
  tapTiebreak(key, mid){
    UI.formTiebreakOrder[key] = UI.formTiebreakOrder[key] || [];
    if(!UI.formTiebreakOrder[key].includes(mid)){
      UI.formTiebreakOrder[key].push(mid);
    }
    updateTiebreakSection();
  },
  resetTiebreak(key){
    UI.formTiebreakOrder[key] = [];
    updateTiebreakSection();
  },
  updatePreview(mid){
    const el = document.getElementById('score-preview-'+mid);
    if(el) el.textContent = UI.formEntries[mid]+' 点';
  },
  onDrumScroll(mid, idx){
    const key = mid+'_'+idx;
    clearTimeout(InputForm._scrollTimers[key]);
    InputForm._scrollTimers[key] = setTimeout(()=>{
      const el = document.getElementById('drum-'+mid+'-'+idx);
      if(!el) return;
      let digit = Math.round(el.scrollTop/DRUM_ITEM_H);
      digit = Math.max(0, Math.min(9, digit));
      el.scrollTop = digit*DRUM_ITEM_H;
      const digits = InputForm.getDrumDigits(mid);
      digits[idx] = String(digit);
      UI.formLeading[mid] = digits.join('').replace(/^0+(?=\d)/,'') || '0';
      InputForm.composeEntry(mid);
      InputForm.updatePreview(mid);
      updateScoreDiffDisplay();
      updateTiebreakSection();
    }, 130);
  },
  initDrumScrollPositions(){
    UI.formMemberIds.forEach(mid=>{
      const digits = InputForm.getDrumDigits(mid);
      digits.forEach((d,idx)=>{
        const el = document.getElementById('drum-'+mid+'-'+idx);
        if(el) el.scrollTop = parseInt(d,10)*DRUM_ITEM_H;
      });
    });
  },
  close(){ UI.showInputForm=false; UI.editingHistoryId=null; renderModal(); },
  requestClose(){
    showConfirmModal('保存せずに閉じますか？','入力した内容は保存されません。閉じてもよいですか？', ()=>{ InputForm.close(); }, '閉じる', ()=>{ renderModal(); });
  },
  dismissWarning(){ renderModal(); },
  save(){
    if(UI._saving) return;
    const rule=getRule(UI.formRuleId);
    const entries=UI.formMemberIds.map(mid=>({memberId:mid, rawScore:numOrZero(UI.formEntries[mid])}));
    const expectedTotal=rule.startPoints*UI.formMemberIds.length;
    const currentTotal=entries.reduce((a,e)=>a+e.rawScore,0);
    const diff=currentTotal-expectedTotal;
    if(diff!==0){
      renderFormWarningModal('⚠️ 点数がずれています！', `合計 ${currentTotal}点 が規定合計 ${expectedTotal}点 と一致していません（差分 ${sign(diff)}点）。持ち点の入力を確認してから保存してください。`);
      return;
    }
    const anyBusted = UI.formMemberIds.some(mid=>UI.formSign[mid]<0);
    const needsTobashi = anyBusted && rule.tobiAri && rule.tobiPenalty>0;
    if(needsTobashi && !UI.formTobashiTarget){
      renderFormWarningModal('⚠️ 飛ばし先が未選択です！', `箱下の人がいます。トビ罰符（${rule.tobiPenalty}点）を受け取る人の「飛ばし」を選んでから保存してください。`);
      return;
    }
    if(rule.tiebreakRule==='atamahane'){
      const groups = {};
      entries.forEach(e=>{ (groups[String(e.rawScore)]=groups[String(e.rawScore)]||[]).push(e.memberId); });
      const unresolved = Object.values(groups).filter(g=>g.length>1).some(g=>{
        const key=g.slice().sort().join('_');
        const order=UI.formTiebreakOrder[key];
        return !(order && order.length===g.length);
      });
      if(unresolved){
        renderFormWarningModal('⚠️ 同点の着順が未選択です！', '同点の方がいます。「頭ハネ」ルールのため、着順が上の順にタップして選んでから保存してください。');
        return;
      }
    }
    UI._saving = true;
    const computed=computeSession(rule, entries, {tobashiTargetId: UI.formTobashiTarget, tiebreakOrders: UI.formTiebreakOrder});
    const players=computed.results.map(c=>({memberId:c.memberId, rawScore:c.rawScore, rank:c.rank, point:c.point}));
    if(UI.editingHistoryId){
      const s=DB.history.find(x=>x.id===UI.editingHistoryId);
      s.ruleId=rule.id; s.players=players; s.babaTotal=computed.babaTotal;
    } else {
      DB.history.push({ id:uid(), date:todayStr(), ruleId:rule.id, players, babaTotal:computed.babaTotal });
    }
    persist('history');
    UI.showInputForm=false; UI.editingHistoryId=null;
    UI._saving = false;
    document.getElementById('modalRoot').innerHTML='';
    render();
  }
};

/* 合計・差分表示だけをDOM直接更新（入力中に全体を再描画してフォーカスが外れるのを防ぐ） */
function updateScoreDiffDisplay(){
  const rule=getRule(UI.formRuleId);
  if(!rule) return;
  const expectedTotal=rule.startPoints*UI.formMemberIds.length;
  const currentTotal=UI.formMemberIds.reduce((a,mid)=>a+numOrZero(UI.formEntries[mid]),0);
  const diff=currentTotal-expectedTotal;
  const el=document.getElementById('scoreDiffHint');
  if(el){
    el.innerHTML = `合計: ${currentTotal} 点 / 規定合計: ${expectedTotal} 点
      <span class="${diff===0?'diff-ok':'diff-bad'}"> (${diff===0?'一致':'差分 '+sign(diff)})</span>${diff!==0?'<div class="diff-bad" style="margin-top:4px">⚠️ 一致するまで保存できません</div>':''}`;
  }
}

/* 頭ハネ設定時：同点者の着順を選ばせるUIをその場で更新（フォーム全体は再描画しない） */
function tiebreakSectionHtml(){
  const rule=getRule(UI.formRuleId);
  if(!rule || rule.tiebreakRule!=='atamahane') return '';
  const scores={};
  UI.formMemberIds.forEach(mid=>{ scores[mid]=numOrZero(UI.formEntries[mid]); });
  const groups={};
  UI.formMemberIds.forEach(mid=>{ const key=String(scores[mid]); (groups[key]=groups[key]||[]).push(mid); });
  const tieGroups = Object.values(groups).filter(g=>g.length>1);
  if(tieGroups.length===0) return '';
  return tieGroups.map(g=>{
    const key = g.slice().sort().join('_');
    const order = UI.formTiebreakOrder[key] || [];
    return `<div class="card" style="background:#fff8e1;border:1.5px solid #f0c96b;margin-bottom:10px">
      <div style="font-weight:700;font-size:13px;margin-bottom:8px">⚠️ 同点：${g.map(mid=>esc(memberName(mid))).join('・')} → 着順が上の順にタップしてください</div>
      <div class="row wrap" style="gap:8px">
        ${g.map(mid=>{
          const pos = order.indexOf(mid);
          return `<button class="chip ${pos>=0?'selected':''}" onclick="InputForm.tapTiebreak('${key}','${mid}')">${pos>=0?(pos+1)+'. ':''}${esc(memberName(mid))}</button>`;
        }).join('')}
        ${order.length?`<button class="link-btn" onclick="InputForm.resetTiebreak('${key}')">やり直す</button>`:''}
      </div>
    </div>`;
  }).join('');
}
function updateTiebreakSection(){
  const el = document.getElementById('tiebreakSection');
  if(el) el.innerHTML = tiebreakSectionHtml();
}

/* ============ チップ（祝儀）管理 ============ */
function computeChipTotals(date, opts){
  opts = opts || {};
  const totals={};
  DB.chipTx.filter(t=>t.date===date && (!opts.onlyUnsettled || !t.settlementId)).forEach(t=>{
    if(t.type==='transfer'){
      // 貸す側はプラス収支、借りる側はマイナス収支（貸した分は後で返してもらう＝貸した人の取り分）
      totals[t.fromId]=(totals[t.fromId]||0)+t.amount;
      totals[t.toId]=(totals[t.toId]||0)-t.amount;
    } else if(t.type==='final'){
      totals[t.memberId]=(totals[t.memberId]||0)+t.amount;
    }
  });
  return totals;
}

const ChipTracker = {
  getFinalValue(mid, date){
    const t = DB.chipTx.find(x=>x.date===date && x.type==='final' && x.memberId===mid && !x.settlementId);
    return t ? t.amount : 0;
  },
  toggleFinalSign(mid){
    UI.chipSign = UI.chipSign || {};
    UI.chipSign[mid] = ((UI.chipSign[mid]||1) * -1);
    const absVal = Math.abs(ChipTracker.getFinalValue(mid, todayStr()));
    ChipTracker.setFinalValue(mid, UI.chipSign[mid]*absVal);
  },
  setFinalAbs(mid, val){
    UI.chipSign = UI.chipSign || {};
    const s = UI.chipSign[mid] || 1;
    const absVal = Math.abs(numOrZero(val));
    ChipTracker.setFinalValue(mid, s*absVal);
  },
  setFinalValue(mid, val){
    const amt = numOrZero(val);
    const date = todayStr();
    const existing = DB.chipTx.find(x=>x.date===date && x.type==='final' && x.memberId===mid && !x.settlementId);
    if(existing){ existing.amount = amt; }
    else{ DB.chipTx.push({ id:uid(), date, type:'final', memberId:mid, amount:amt }); }
    persist('chipTx');
    render();
  },
  openTransfer(){
    const ids = UI.home.memberIds.length? UI.home.memberIds : DB.members.map(m=>m.id);
    UI.chipModal='transfer';
    UI.chipForm={ fromId: ids[0]||'', toId: ids[1]||ids[0]||'', amount:'' };
    renderChipModal();
  },
  close(){ UI.chipModal=null; document.getElementById('modalRoot').innerHTML=''; },
  updateForm(key,val){ UI.chipForm[key]=val; },
  saveTransfer(){
    const amt=numOrZero(UI.chipForm.amount);
    if(!UI.chipForm.fromId || !UI.chipForm.toId || UI.chipForm.fromId===UI.chipForm.toId || amt<=0){
      renderInfoModal('入力が足りません','貸す側・借りる側（別々）・1以上の枚数を入力してください。'); return;
    }
    DB.chipTx.push({ id:uid(), date:todayStr(), type:'transfer', fromId:UI.chipForm.fromId, toId:UI.chipForm.toId, amount:amt });
    persist('chipTx');
    UI.chipModal=null; document.getElementById('modalRoot').innerHTML='';
    render();
  },
  remove(txId){
    showConfirmModal('削除しますか？', 'このチップの記録を削除しますか？', ()=>{
      DB.chipTx = DB.chipTx.filter(t=>t.id!==txId);
      persist('chipTx'); render();
    }, '削除する');
  }
};

function renderChipModal(){
  if(!UI.chipModal){ return; }
  const f=UI.chipForm;
  const inner = `
      <div class="modal-head"><h2>チップの貸し借りを記録</h2><button class="close-x" onclick="ChipTracker.close()">✕</button></div>
      <div class="row">
        <div class="field-wrap grow"><label class="field">貸す側</label>
          <select onchange="ChipTracker.updateForm('fromId', this.value)">
            ${DB.members.map(m=>`<option value="${m.id}" ${f.fromId===m.id?'selected':''}>${esc(m.name)}</option>`).join('')}
          </select></div>
        <div class="field-wrap grow"><label class="field">借りる側</label>
          <select onchange="ChipTracker.updateForm('toId', this.value)">
            ${DB.members.map(m=>`<option value="${m.id}" ${f.toId===m.id?'selected':''}>${esc(m.name)}</option>`).join('')}
          </select></div>
      </div>
      <div class="field-wrap"><label class="field">枚数</label>
        <input type="number" step="1" min="1" value="${f.amount}" oninput="ChipTracker.updateForm('amount', this.value)"></div>
      <div class="hint">貸す側はその分プラス、借りる側はマイナスの収支として計算されます。</div>
      <button class="btn block" style="margin-top:10px" onclick="ChipTracker.saveTransfer()">記録する</button>`;
  document.getElementById('modalRoot').innerHTML = `<div class="modal-overlay" onclick="if(event.target===this) ChipTracker.close()"><div class="modal">${inner}</div></div>`;
}

}

  }

/* ============ 描画: 分析 ============ */
function gamesForMember(memberId, pcFilter){
  return DB.history.filter(s=>{
    if(!s.players.some(p=>p.memberId===memberId)) return false;
    if(pcFilter==='all') return true;
    const r=getRule(s.ruleId);
    return r && r.playerCount===pcFilter;
  });
}

function computeStats(memberId, pcFilter){
  pcFilter = pcFilter || 'all';
  const games = gamesForMember(memberId, pcFilter);
  const n=games.length;
  if(n===0) return null;
  let rankCount=[0,0,0,0], totalPoint=0;
  games.forEach(s=>{
    const p=s.players.find(p=>p.memberId===memberId);
    rankCount[p.rank-1]=(rankCount[p.rank-1]||0)+1;
    totalPoint+=p.point;
  });
  const maxRank = Math.max(...games.map(s=>s.players.length));
  const avgRank=games.reduce((a,s)=>a+s.players.find(p=>p.memberId===memberId).rank,0)/n;
  const topRate=(rankCount[0]||0)/n*100;
  const rentaiRate=((rankCount[0]||0)+(rankCount[1]||0))/n*100;
  const lastRate=(rankCount[maxRank-1]||0)/n*100;
  return { n, rankCount, maxRank, totalPoint, avgRank, topRate, rentaiRate, lastRate, avgPoint: totalPoint/n, games };
}

/* 精算表からの通算チップ枚数・通算収支（金額） */
function computeSettlementStats(memberId, pcFilter){
  pcFilter = pcFilter || 'all';
  let chipCount=0, moneyTotal=0, settlementCount=0;
  DB.settlements.forEach(st=>{
    if(!st.memberIds.includes(memberId)) return;
    const rule = getRule(st.ruleId);
    if(pcFilter!=='all'){
      const pc = rule ? rule.playerCount : st.memberIds.length;
      if(pc!==pcFilter) return;
    }
    const pm = st.perMember[memberId];
    if(!pm) return;
    settlementCount++;
    chipCount += pm.chipCount||0;
    const scoreYen = st.rateEnabledUsed ? pm.scorePoint*st.rateUsed : 0;
    const chipYen = st.chipEnabledUsed ? (pm.chipCount||0)*st.chipValueUsed : 0;
    moneyTotal += scoreYen + chipYen;
  });
  return { chipCount, moneyTotal, settlementCount };
}

/* 対戦相手別成績：スコア差・チップ差・金額差は「相手の合計値の符号を反転したもの」で統一
   （多人数戦のため厳密な1対1のやり取りではないが、相手にどれだけ勝ち越したかの目安として計算） */
function computeHeadToHead(memberId, pcFilter){
  pcFilter = pcFilter || 'all';
  const opp={};
  const ensure=(oid)=>{ if(!opp[oid]) opp[oid]={games:0,win:0,lose:0,draw:0,scoreDiff:0,chipDiff:0,moneyDiff:0,rankCounts:[0,0,0,0],maxRank:0}; return opp[oid]; };

  /* スコア差：各対局ごとに「勝ち組の取り分は負け組の損失から比例配分される」と考え、
     同じ側（勝ち同士・負け同士）の差分は0、勝ち-負けの間だけ差分が生まれるようにする */
  DB.history.forEach(s=>{
    const rule=getRule(s.ruleId);
    if(pcFilter!=='all' && (!rule || rule.playerCount!==pcFilter)) return;
    const me=s.players.find(p=>p.memberId===memberId);
    if(!me) return;
    s.players.forEach(p=>{
      if(p.memberId===memberId) return;
      const o=ensure(p.memberId);
      o.games++;
      if(me.rank<p.rank) o.win++; else if(me.rank>p.rank) o.lose++; else o.draw++;
      o.rankCounts[me.rank-1] = (o.rankCounts[me.rank-1]||0)+1;
      o.maxRank = Math.max(o.maxRank, s.players.length);
    });
    const winners = s.players.filter(p=>p.point>0);
    const losers = s.players.filter(p=>p.point<0);
    const totalWin = winners.reduce((a,w)=>a+w.point,0);
    if(totalWin>0){
      winners.forEach(w=>{
        losers.forEach(l=>{
          const contribution = (w.point/totalWin) * (-l.point);
          if(w.memberId===memberId){ ensure(l.memberId).scoreDiff += contribution; }
          if(l.memberId===memberId){ ensure(w.memberId).scoreDiff -= contribution; }
        });
      });
    }
  });

  /* チップ差・金額差：同様の比例配分を精算表単位で計算 */
  DB.settlements.forEach(st=>{
    if(!st.memberIds.includes(memberId)) return;
    const rule=getRule(st.ruleId);
    if(pcFilter!=='all'){
      const pc = rule?rule.playerCount:st.memberIds.length;
      if(pc!==pcFilter) return;
    }
    const values = st.memberIds.map(mid=>{
      const pm = st.perMember[mid] || {scorePoint:0,chipCount:0};
      const scoreYen = st.rateEnabledUsed ? pm.scorePoint*st.rateUsed : 0;
      const chipYen = st.chipEnabledUsed ? (pm.chipCount||0)*st.chipValueUsed : 0;
      return { mid, chipCount: pm.chipCount||0, money: scoreYen+chipYen };
    });
    st.memberIds.forEach(oid=>{ if(oid!==memberId) ensure(oid); });

    const winnersM = values.filter(v=>v.money>0);
    const losersM = values.filter(v=>v.money<0);
    const totalWinM = winnersM.reduce((a,w)=>a+w.money,0);
    if(totalWinM>0){
      winnersM.forEach(w=>{
        losersM.forEach(l=>{
          const contribution = (w.money/totalWinM)*(-l.money);
          if(w.mid===memberId){ ensure(l.mid).moneyDiff += contribution; }
          if(l.mid===memberId){ ensure(w.mid).moneyDiff -= contribution; }
        });
      });
    }
    const winnersC = values.filter(v=>v.chipCount>0);
    const losersC = values.filter(v=>v.chipCount<0);
    const totalWinC = winnersC.reduce((a,w)=>a+w.chipCount,0);
    if(totalWinC>0){
      winnersC.forEach(w=>{
        losersC.forEach(l=>{
          const contribution = (w.chipCount/totalWinC)*(-l.chipCount);
          if(w.mid===memberId){ ensure(l.mid).chipDiff += contribution; }
          if(l.mid===memberId){ ensure(w.mid).chipDiff -= contribution; }
        });
      });
    }
  });
  return opp;
}

/* ルール別成績 */
function computeRuleBreakdown(memberId, pcFilter){
  pcFilter = pcFilter || 'all';
  const byRule = {};
  gamesForMember(memberId, pcFilter).forEach(s=>{
    if(!byRule[s.ruleId]) byRule[s.ruleId] = { n:0, totalPoint:0, rankSum:0, topCount:0 };
    const p = s.players.find(pp=>pp.memberId===memberId);
    const b = byRule[s.ruleId];
    b.n++; b.totalPoint += p.point; b.rankSum += p.rank; if(p.rank===1) b.topCount++;
  });
  return Object.entries(byRule).map(([ruleId,b])=>({
    ruleId, rule:getRule(ruleId),
    n:b.n, totalPoint:b.totalPoint, avgRank:b.rankSum/b.n, topRate:b.topCount/b.n*100
  })).sort((a,b)=>b.totalPoint-a.totalPoint);
}

/* 円グラフ（着順分布）をCSSのconic-gradientで描画 */
function pieChartHtml(rankCount, n, maxRank, size){
  size = size || 110;
  const colors = ['#c8912a','#3d8bd4','#6a994e','#9d4edd'];
  let acc = 0;
  const stops = [];
  for(let i=0;i<maxRank;i++){
    const cnt = rankCount[i]||0;
    const pct = n? (cnt/n*100) : 0;
    const start = acc;
    acc += pct;
    stops.push(`${colors[i%colors.length]} ${start}% ${acc}%`);
  }
  const gradient = stops.length ? `conic-gradient(${stops.join(',')})` : '#e3e0d8';
  const legend = Array.from({length:maxRank},(_,i)=>{
    const cnt = rankCount[i]||0;
    const pct = n ? Math.round(cnt/n*1000)/10 : 0;
    return `<div class="row" style="align-items:center;gap:6px;font-size:${size<80?11:12.5}px">
      <span style="width:9px;height:9px;border-radius:50%;background:${colors[i%colors.length]};display:inline-block"></span>
      ${i+1}位 ${pct}%（${cnt}回）
    </div>`;
  }).join('');
  return `<div class="row" style="align-items:center;gap:14px;margin-top:8px">
    <div style="width:${size}px;height:${size}px;border-radius:50%;background:${gradient};flex-shrink:0"></div>
    <div style="display:flex;flex-direction:column;gap:3px">${legend}</div>
  </div>`;
}

/* 簡易ルールベースの分析コメント（AI分析：ローカルで完結する統計サマリー） */
function generateInsights(memberId, pcFilter){
  const s = computeStats(memberId, pcFilter);
  if(!s || s.n<2) return ['対局数がもう少し増えると、傾向が見えてきます。'];
  const notes=[];
  if(s.topRate>=40) notes.push(`トップ率${s.topRate.toFixed(0)}%は好調です。勝ち切る力があります。`);
  else if(s.lastRate>=40) notes.push(`ラス率${s.lastRate.toFixed(0)}%とやや高めです。守りの打ち方も意識すると安定するかもしれません。`);
  if(s.avgRank<=2.0) notes.push(`平均順位${s.avgRank.toFixed(2)}は好成績です。`);
  else if(s.avgRank>=3.0) notes.push(`平均順位${s.avgRank.toFixed(2)}。着順を落ち着かせる工夫の余地がありそうです。`);
  const opp = computeHeadToHead(memberId, pcFilter);
  const oppEntries = Object.entries(opp).filter(([,o])=>o.games>=2);
  if(oppEntries.length){
    oppEntries.sort((a,b)=>b[1].scoreDiff-a[1].scoreDiff);
    const best = oppEntries[0];
    const worst = oppEntries[oppEntries.length-1];
    if(best[1].scoreDiff>0) notes.push(`${memberName(best[0])}さんとの対戦成績が良好です（差分 ${sign(Math.round(best[1].scoreDiff*10)/10)}）。`);
    if(worst[1].scoreDiff<0 && worst[0]!==best[0]) notes.push(`${memberName(worst[0])}さんには分が悪いようです（差分 ${sign(Math.round(worst[1].scoreDiff*10)/10)}）。`);
  }
  const rules = computeRuleBreakdown(memberId, pcFilter);
  if(rules.length>1){
    const bestRule = rules[0];
    if(bestRule.rule) notes.push(`「${esc(bestRule.rule.name)}」で最も好成績（通算${sign(Math.round(bestRule.totalPoint*10)/10)}）です。`);
  }
  if(notes.length===0) notes.push('目立った偏りのない、安定した成績です。');
  return notes;
}

  },

  toggleMemberRule(ruleId){

  },
  addMemberAlias(){
    const el = document.getElementById('newAliasName');
    if(!el) return;
    const name = el.value.trim();
    if(!name) return;
    UI.memberDraft.aliases = UI.memberDraft.aliases || [];
    if(!UI.memberDraft.aliases.includes(name) && name!==UI.memberDraft.name){
      UI.memberDraft.aliases.push(name);
    }
    el.value='';
    renderMemberModal();
  },
  removeMemberAlias(name){
    UI.memberDraft.aliases = (UI.memberDraft.aliases||[]).filter(a=>a!==name);
    renderMemberModal();
  },
  editMember(id){
    UI.editingMemberId=id;
    UI.memberDraft=ensureMemberDefaults(JSON.parse(JSON.stringify(getMember(id))));
    renderMemberModal();
  },
  removeMember(id){
    showConfirmModal('削除しますか？', 'このメンバーを削除しますか？（過去の履歴データは残ります）', ()=>{
      DB.members=DB.members.filter(m=>m.id!==id);
      persist('members'); render();
    }, '削除する');
  },
  openMergeMembers(){
    if(DB.members.length<2){ renderInfoModal('メンバーが足りません','統合するには2人以上のメンバーが必要です。'); return; }
    UI.mergeForm = { primaryId: DB.members[0].id, mergeIds: [] };
    renderMergeMembersModal();
  },
  updateMergePrimary(id){
    UI.mergeForm.primaryId = id;
    UI.mergeForm.mergeIds = UI.mergeForm.mergeIds.filter(x=>x!==id);
    renderMergeMembersModal();
  },
  toggleMergeTarget(id){
    const idx = UI.mergeForm.mergeIds.indexOf(id);
    if(idx>=0) UI.mergeForm.mergeIds.splice(idx,1); else UI.mergeForm.mergeIds.push(id);
    renderMergeMembersModal();
  },
  closeMergeMembers(){ UI.mergeForm=null; document.getElementById('modalRoot').innerHTML=''; },
  confirmMerge(){
    const { primaryId, mergeIds } = UI.mergeForm;
    if(!primaryId || mergeIds.length===0){ renderInfoModal('選択が足りません','残すメンバーと、統合するメンバーを1人以上選んでください。'); return; }
    const names = mergeIds.map(id=>memberName(id)).join('・');
    showConfirmModal('メンバーを統合しますか？', `「${names}」のデータを「${memberName(primaryId)}」に統合します。統合されるメンバーは削除され、元に戻せません。`, ()=>{
      Settings.executeMerge(primaryId, mergeIds);
    }, '統合する');
  },
  executeMerge(primaryId, mergeIds){
    const mergeSet = new Set(mergeIds);
    DB.history.forEach(s=>{
      s.players.forEach(p=>{ if(mergeSet.has(p.memberId)) p.memberId=primaryId; });
    });
    DB.chipTx.forEach(t=>{
      if(t.memberId && mergeSet.has(t.memberId)) t.memberId=primaryId;
      if(t.fromId && mergeSet.has(t.fromId)) t.fromId=primaryId;
      if(t.toId && mergeSet.has(t.toId)) t.toId=primaryId;
    });
    DB.settlements.forEach(st=>{
      st.memberIds = st.memberIds.map(mid=> mergeSet.has(mid) ? primaryId : mid);
      const seen = {}; const newMemberIds = [];
      st.memberIds.forEach(mid=>{ if(!seen[mid]){ seen[mid]=true; newMemberIds.push(mid); } });
      st.memberIds = newMemberIds;
      const newPerMember = {};
      Object.entries(st.perMember||{}).forEach(([mid,val])=>{
        const targetId = mergeSet.has(mid) ? primaryId : mid;
        if(!newPerMember[targetId]) newPerMember[targetId] = { scorePoint:0, chipCount:0 };
        newPerMember[targetId].scorePoint += val.scorePoint||0;
        newPerMember[targetId].chipCount += val.chipCount||0;
      });
      st.perMember = newPerMember;
    });
    const primary = DB.members.find(m=>m.id===primaryId);
    mergeIds.forEach(mid=>{
      const m = DB.members.find(x=>x.id===mid);
      if(m && m.ruleIds && m.ruleIds.length && primary){
        primary.ruleIds = Array.from(new Set([...(primary.ruleIds||[]), ...m.ruleIds]));
      }
      if(m && primary){
        primary.aliases = primary.aliases || [];
        const namesToAdd = [m.name, ...(m.aliases||[])].filter(n=>n && n!==primary.name && !primary.aliases.includes(n));
        primary.aliases = Array.from(new Set([...primary.aliases, ...namesToAdd]));
      }
    });
    DB.members = DB.members.filter(m=>!mergeSet.has(m.id));

/* ウマの「計算軸」= returnPoints/1000 - uma（同点狙いのしきい値）をDOM直接更新（入力中の再描画を避けるため） */
function updateAxisDisplay(){
  const d=UI.ruleDraft;
  if(!d) return;
  d.uma.forEach((v,i)=>{
    if(i===0) return; // 1位は計算軸を表示しない
    const el=document.getElementById('axis-'+i);
    if(el){ const axis = (d.returnPoints/1000) - v; el.textContent = axis.toFixed(1)+''; }
  });
}

/* 受信データの名前解決：正式名/別名と一致するメンバーを探し、複数候補があれば確認モーダルで選ばせる */
function resolveMemberNames(names, onResolved, colorsByName){
  colorsByName = colorsByName || {};
  const uniqueNames = Array.from(new Set(names));
  const nameToId = {};
  const ambiguous = [];
  uniqueNames.forEach(name=>{
    const matches = DB.members.filter(m => m.name===name || (m.aliases||[]).includes(name));
    if(matches.length===1){
      nameToId[name] = matches[0].id;
    } else if(matches.length===0){
      const senderColor = colorsByName[name];
      const m = { id:uid(), name, color: senderColor || PALETTE[DB.members.length % PALETTE.length], isSelf:false, ruleIds:[], aliases:[] };
      DB.members.push(m);
      nameToId[name] = m.id;
    } else {
      ambiguous.push({ name, matches });
    }
  });
  if(ambiguous.length===0){
    onResolved(nameToId);
  } else {
    UI.pendingNameResolution = { ambiguous, nameToId, onResolved, choices:{} };
    renderNameResolutionModal();
  }
}
function resolveNameChoice(idx, val){
  UI.pendingNameResolution.choices[idx] = val;
}
function finalizeNameResolution(){
  const p = UI.pendingNameResolution;
  if(!p) return;
  p.ambiguous.forEach((a,i)=>{
    const choice = p.choices[i] || a.matches[0].id;
    if(choice==='__new__'){
      const m = { id:uid(), name:a.name, color:PALETTE[DB.members.length % PALETTE.length], isSelf:false, ruleIds:[], aliases:[] };
      DB.members.push(m);
      p.nameToId[a.name] = m.id;
    } else {
      p.nameToId[a.name] = choice;
    }
  });
  document.getElementById('modalRoot').innerHTML='';
  const onResolved = p.onResolved;
  const nameToId = p.nameToId;
  UI.pendingNameResolution = null;
  onResolved(nameToId);
}
function renderNameResolutionModal(){
  const p = UI.pendingNameResolution;
  if(!p){ return; }
  const html = `
  <div class="modal-overlay">
    <div class="modal">
      <div class="modal-head"><h2>メンバーの確認</h2></div>
      <div class="small-note" style="margin-bottom:14px">同じ名前が複数のメンバーの別名として登録されています。どちらのデータとして統合するか選んでください。</div>
      ${p.ambiguous.map((a,i)=>`
        <div class="field-wrap"><label class="field">受信した名前：「${esc(a.name)}」</label>
          <select onchange="resolveNameChoice(${i}, this.value)">
            ${a.matches.map(m=>`<option value="${m.id}">${esc(m.name)} として統合</option>`).join('')}
            <option value="__new__">別の新しいメンバーとして追加</option>
          </select>
        </div>`).join('')}
      <button class="btn block" style="margin-top:8px" onclick="finalizeNameResolution()">決定</button>
    </div>
  </div>`;
  document.getElementById('modalRoot').innerHTML = html;
}

/* トグルやプリセット変更時、スクロール位置を保ったまま再描画する（新規オープン時は0のまま） */
function rerenderRulePreserve(){
  const modalEl = document.querySelector('#modalRoot .modal');
  const scrollTop = modalEl ? modalEl.scrollTop : 0;
  renderRuleModal();
  const newModalEl = document.querySelector('#modalRoot .modal');
  if(newModalEl) newModalEl.scrollTop = scrollTop;
}

const YN = v => v ? '○' : '×';

/* 汎用の簡易メッセージモーダル（alertがブロックされる環境でも確実に表示するため） */
function renderInfoModal(title, message, buttonLabel){
  document.getElementById('modalRoot').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) closeInfoModal()">
      <div class="modal">
        <div class="modal-head"><h2>${esc(title)}</h2><button class="close-x" onclick="closeInfoModal()">✕</button></div>
        <div class="small-note" style="white-space:pre-line">${esc(message)}</div>
        <button class="btn block" style="margin-top:14px" onclick="closeInfoModal()">${esc(buttonLabel||'閉じる')}</button>
      </div>
    </div>`;
}
function closeInfoModal(){ document.getElementById('modalRoot').innerHTML=''; }

/* 対局入力フォーム専用の警告モーダル：閉じると入力していた内容のまま入力画面に戻る */
function renderFormWarningModal(title, message){
  document.getElementById('modalRoot').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) InputForm.dismissWarning()">
      <div class="modal">
        <div class="modal-head"><h2>${esc(title)}</h2><button class="close-x" onclick="InputForm.dismissWarning()">✕</button></div>
        <div class="small-note" style="white-space:pre-line">${esc(message)}</div>
        <button class="btn block" style="margin-top:14px" onclick="InputForm.dismissWarning()">入力に戻る</button>
      </div>

/* 汎用の確認モーダル（削除・ログアウトなど破壊的操作の確認用。confirm()の代わりに使用） */
let _confirmModalCallback = null;
let _confirmModalCancelCallback = null;
function showConfirmModal(title, message, onConfirm, confirmLabel, onCancel){
  _confirmModalCallback = onConfirm;
  _confirmModalCancelCallback = onCancel || null;
  document.getElementById('modalRoot').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this) cancelConfirmModal()">
      <div class="modal">
        <div class="modal-head"><h2>${esc(title)}</h2><button class="close-x" onclick="cancelConfirmModal()">✕</button></div>
        <div class="small-note" style="white-space:pre-line">${esc(message)}</div>
        <div class="row" style="margin-top:16px;gap:8px">
          <button class="btn secondary grow" onclick="cancelConfirmModal()">キャンセル</button>
          <button class="btn danger grow" onclick="runConfirmModal()">${esc(confirmLabel||'実行する')}</button>
        </div>
      </div>
    </div>`;
}
function closeConfirmModal(){ _confirmModalCallback=null; _confirmModalCancelCallback=null; document.getElementById('modalRoot').innerHTML=''; }
function cancelConfirmModal(){
  const cb=_confirmModalCancelCallback;
  _confirmModalCallback=null; _confirmModalCancelCallback=null;
  if(cb) cb(); else document.getElementById('modalRoot').innerHTML='';
}
function runConfirmModal(){ const cb=_confirmModalCallback; closeConfirmModal(); if(cb) cb(); }

/* ============ スコア（対局結果）の他アカウントへの送信 ============ */
const ScoreShare = {
  async shareSession(sessionId){
    if(!fbAuth || !currentUser){ renderInfoModal('ログインが必要です','スコアを送るにはログインが必要です。設定→アカウントからログインしてください。'); return; }
    const s = DB.history.find(x=>x.id===sessionId);
    if(!s) return;
    const rule = getRule(s.ruleId);
    const payload = {
      date: s.date,
      ruleName: rule?rule.name:'不明なルール',
      rule: rule||null,
      players: s.players.map(p=>({name:memberName(p.memberId), rawScore:p.rawScore, rank:p.rank, point:p.point, color:memberColor(p.memberId)}))
    };
    const code = Math.random().toString(36).slice(2,8).toUpperCase();
    try{
      await fbDb.collection('mahjong_shared_scores').doc(code).set({
        payload: JSON.stringify(payload),
        sharedBy: currentUser.email || currentUser.uid,
        sharedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      UI.scoreShareCode = code;
      renderScoreShareCodeModal();
    }catch(e){ console.error(e); renderInfoModal('送信に失敗しました', firestoreErrorMessage(e, 'mahjong_shared_scores')); }
  },
  closeScoreShareCode(){ UI.scoreShareCode=null; document.getElementById('modalRoot').innerHTML=''; },
  openReceiveModal(){ UI.receiveScoreCode=''; renderReceiveScoreModal(); },
  updateReceiveCode(val){ UI.receiveScoreCode = val.toUpperCase(); },
  closeReceive(){ UI.receiveScoreCode=null; document.getElementById('modalRoot').innerHTML=''; },
  async receiveByCode(){
    if(!fbAuth || !currentUser){ renderInfoModal('ログインが必要です','受け取るにはログインが必要です。設定→アカウントからログインしてください。'); return; }
    const code=(UI.receiveScoreCode||'').trim();
    if(!code){ renderInfoModal('コード未入力','コードを入力してください。'); return; }
    try{
      const doc = await fbDb.collection('mahjong_shared_scores').doc(code).get();
      if(!doc.exists){ renderInfoModal('見つかりません','コードが見つかりませんでした。ご確認ください。'); return; }
      const payload = JSON.parse(doc.data().payload);
      let rule = DB.rules.find(r=>r.name===payload.ruleName);
      if(!rule && payload.rule){
        rule = ensureRuleDefaults({...payload.rule, id:uid()});
        DB.rules.push(rule);
      }
      if(!rule) rule = DB.rules[0];
      const names = (payload.players||[]).map(p=>p.name);
      const colorsByName = {};
      (payload.players||[]).forEach(p=>{ if(p.color) colorsByName[p.name]=p.color; });
      resolveMemberNames(names, (nameToId)=>{
        const players = (payload.players||[]).map(p=>({memberId:nameToId[p.name], rawScore:p.rawScore, rank:p.rank, point:p.point}));
        DB.history.push({id:uid(), date:payload.date, ruleId:rule.id, players});
        persist('members'); persist('rules'); persist('history');
        UI.receiveScoreCode=null;
        renderInfoModal('受け取りました','スコアを受け取りました。');
        render();
      }, colorsByName);
    }catch(e){ console.error(e); renderInfoModal('受け取りに失敗しました', firestoreErrorMessage(e, 'mahjong_shared_scores')); }
  }
};

/* ============ アプリの更新確認 ============ */
const APP_VERSION = document.querySelector('meta[name="app-version"]').content;
async function checkForUpdate(){
  try{
    const res = await fetch(location.href.split('#')[0].split('?')[0] + '?_=' + Date.now(), {cache:'no-store'});
    const text = await res.text();
    const m = text.match(/<meta name="app-version" content="([^"]+)">/);
    if(m && m[1] && m[1] !== APP_VERSION){
      const banner = document.getElementById('updateBanner');
      if(banner) banner.style.display = 'flex';
    }
  }catch(e){ /* オフライン等は静かに無視 */ }
}
// バックグラウンドで自動的に確認（起動時・5分ごと・タブ復帰時）。実際の更新はボタン操作で行う
setTimeout(checkForUpdate, 4000);
setInterval(checkForUpdate, 5*60*1000);
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') checkForUpdate(); });
</script>
